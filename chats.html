<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Messenger - Chats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111b21;
      color: #e9edef;
      height: 100vh;
      overflow: hidden;
    }
    .top-nav {
      background: #202c33;
      padding: 10px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #2a3942;
    }
    .top-nav h1 {
      font-size: 18px;
      font-weight: 500;
    }
    .chat-list {
      height: calc(100vh - 50px);
      overflow-y: auto;
    }
    .chat-item {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #202c33;
      cursor: pointer;
    }
    .chat-item:hover {
      background: #202c33;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #202c33;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    .chat-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .chat-title {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-last {
      font-size: 12px;
      color: #8696a0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-time {
      font-size: 11px;
      color: #8696a0;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="top-nav">
    <h1>Chats</h1>
  </div>
  <div id="chatList" class="chat-list">
    <!-- Chats will appear here -->
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAFKOgNZgaIZ9q09VvmKJrnEWys7ancSEE",
      authDomain: "web-messager-533ae.firebaseapp.com",
      projectId: "web-messager-533ae",
      storageBucket: "web-messager-533ae.firebasestorage.app",
      messagingSenderId: "466370688536",
      appId: "1:466370688536:web:90e63387db2e4b697ff56d",
      measurementId: "G-Q3136YFH7C"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let userUID = null;
    const chatListEl = document.getElementById('chatList');

    // Get user profile for name/phone
    async function getUserProfile(uid) {
      const doc = await db.collection('users').doc(uid).get();
      if (!doc.exists) return { id: uid };
      return { id: uid, ...doc.data() };
    }

    function renderChatItem(chatId, otherUser, lastMessageText, lastMessageAt) {
      const item = document.createElement('div');
      item.className = 'chat-item';

      const title = otherUser.name || otherUser.username || otherUser.phone || 'Chat';
      const initial = title.toString().trim().charAt(0).toUpperCase();

      let timeStr = '';
      if (lastMessageAt && lastMessageAt.toDate) {
        timeStr = lastMessageAt.toDate().toLocaleTimeString([], {
          hour: '2-digit',
          minute: '2-digit'
        });
      }

      item.innerHTML = `
        <div class="avatar">${initial}</div>
        <div class="chat-info">
          <div class="chat-title">${title}</div>
          <div class="chat-last">${lastMessageText || ''}</div>
        </div>
        <div class="chat-time">${timeStr}</div>
      `;

      // Save the OTHER user as selectedFriend
      item.onclick = () => {
        const friend = {
          id: otherUser.id,
          name: otherUser.name || '',
          username: otherUser.username || '',
          phone: otherUser.phone || ''
        };
        localStorage.setItem('selectedFriend', JSON.stringify(friend));
        window.location.href = 'chat.html';
      };

      chatListEl.appendChild(item);
    }

    async function loadChats() {
      chatListEl.innerHTML =
        '<div style="padding:12px;color:#8696a0;">Loading chats...</div>';

      const snapshot = await db.collection('chats')
        .where('participants', 'array-contains', userUID)
        .orderBy('lastMessageAt', 'desc')
        .get();

      if (snapshot.empty) {
        chatListEl.innerHTML =
          '<div style="padding:12px;color:#8696a0;">No chats yet</div>';
        return;
      }

      chatListEl.innerHTML = '';

      for (const docSnap of snapshot.docs) {
        const chat = docSnap.data();
        const participants = chat.participants || [];
        const otherUid = participants.find(uid => uid !== userUID) || userUID;
        const otherUser = await getUserProfile(otherUid);

        renderChatItem(
          docSnap.id,
          otherUser,
          chat.lastMessageText || '',
          chat.lastMessageAt || null
        );
      }
    }

    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      userUID = user.uid;
      loadChats();
    });
  </script>
</body>
</html>
