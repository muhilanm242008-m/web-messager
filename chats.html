<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Messenger - Chats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

  <!-- QR libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script> <!--[page:0][web:307]-->

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top, #202c33 0, #0b141a 45%, #020c12 100%);
      color: #e9edef;
      min-height: 100vh;
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(15, 23, 30, 0.72);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand-logo {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      background: conic-gradient(from 210deg, #00a884, #00d4aa, #007765, #00a884);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #0b141a;
    }
    .brand-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .brand-title span:first-child {
      font-size: 16px;
      font-weight: 600;
    }
    .brand-title span:last-child {
      font-size: 11px;
      color: #8696a0;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #e9edef;
      font-size: 16px;
      backdrop-filter: blur(16px);
      transition: background 0.15s, transform 0.15s;
    }
    .icon-btn:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }

    /* three-dot menu */
    .menu {
      position: absolute;
      top: 40px;
      right: 0;
      background: rgba(15, 23, 30, 0.96);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 18px 40px rgba(0,0,0,0.6);
      padding: 6px 0;
      min-width: 170px;
      display: none;
      z-index: 20;
    }
    .menu-item {
      padding: 8px 14px;
      font-size: 14px;
      color: #e9edef;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .menu-item span.icon {
      width: 20px;
      text-align: center;
    }
    .menu-item:hover {
      background: rgba(255,255,255,0.06);
    }

    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 12px 12px 24px;
    }
    @media (min-width: 768px) {
      .main { padding: 16px 20px 32px; }
    }

    .me-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      margin: 10px 0;
      border-radius: 20px;
      backdrop-filter: blur(18px);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .me-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .me-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00a884, #00d4aa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      overflow: hidden;
    }
    .me-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .me-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .me-name {
      font-size: 15px;
      font-weight: 500;
    }
    .me-meta {
      font-size: 12px;
      color: #8696a0;
    }
    .e2ee-pill {
      font-size: 11px;
      color: #00a884;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(0,168,132,0.6);
      background: rgba(0,168,132,0.08);
      text-align: center;
    }

    .search-card {
      margin-top: 8px;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 18px;
      backdrop-filter: blur(18px);
      background: rgba(20,30,38,0.9);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .search-title {
      font-size: 13px;
      color: #8696a0;
      margin-bottom: 6px;
    }
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .search-input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 16px;
      border: 1px solid transparent;
      background: rgba(32,44,51,0.95);
      color: #e9edef;
      font-size: 14px;
    }
    .search-input::placeholder { color: #8696a0; }
    .search-input:focus {
      outline: none;
      border-color: #00a884;
      box-shadow: 0 0 0 2px rgba(0,168,132,0.35);
    }
    .search-btn {
      padding: 0 10px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #00a884, #00d4aa);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .search-btn:disabled {
      background: #404c55;
      cursor: not-allowed;
    }
    .search-status {
      font-size: 12px;
      color: #8696a0;
      min-height: 1.2em;
    }

    .section-title {
      margin: 10px 2px;
      font-size: 13px;
      color: #8696a0;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .chat-list {
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(18px);
      background: rgba(15, 23, 30, 0.88);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 18px 40px rgba(0,0,0,0.55);
    }
    .chat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .chat-row:last-child {
      border-bottom: none;
    }
    .chat-row:hover {
      background: rgba(255,255,255,0.04);
    }
    .chat-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00a884, #00d4aa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 18px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .chat-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .chat-main {
      flex: 1;
      min-width: 0;
    }
    .chat-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }
    .chat-name {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-time {
      font-size: 11px;
      color: #8696a0;
      white-space: nowrap;
    }
    .chat-last {
      font-size: 13px;
      color: #8696a0;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      text-align: center;
      font-size: 13px;
      color: #8696a0;
      padding: 12px;
    }
    .status strong { color: #00a884; }

    /* modals */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }
    .modal {
      width: 100%;
      max-width: 420px;
      max-height: 90vh;
      overflow: hidden;
      border-radius: 24px;
      backdrop-filter: blur(20px);
      background: rgba(15, 23, 30, 0.92);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
      padding: 18px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .modal-title {
      font-size: 16px;
      font-weight: 500;
    }
    .modal-close {
      border: none;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e9edef;
      cursor: pointer;
      font-size: 16px;
    }

    .profile-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 8px;
    }
    .profile-qr {
      margin-top: 6px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .profile-meta {
      font-size: 13px;
      color: #8696a0;
      text-align: center;
    }

    .scanner-body {
      padding: 6px;
    }
    #qr-scanner {
      width: 100%;
      max-height: 320px;
    }
  </style>
</head>
<body>
  <div class="top-nav">
    <div class="brand">
      <div class="brand-logo">S</div>
      <div class="brand-title">
        <span>Secure Messenger</span>
        <span>End-to-end encrypted</span>
      </div>
    </div>
    <div class="nav-actions">
      <div id="requestBadge" style="
        display:none;
        min-width:18px;
        padding:2px 6px;
        border-radius:999px;
        background:#f15c5c;
        color:white;
        font-size:10px;
        font-weight:600;
        text-align:center;
      " title="Pending chat requests">0</div>

      <!-- three-dot button -->
      <button class="icon-btn" id="menuBtn" title="Menu">⋮</button>

      <!-- dropdown menu -->
      <div class="menu" id="topMenu">
        <div class="menu-item" id="menuQrScan">
          <span class="icon">📷</span>
          <span>QR scan</span>
        </div>
        <div class="menu-item" id="menuProfile">
          <span class="icon">👤</span>
          <span>Profile</span>
        </div>
        <div class="menu-item" id="menuManual">
          <span class="icon">📖</span>
          <span>manual</span>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <!-- self card -->
    <div class="me-card">
      <div class="me-info">
        <div class="me-avatar" id="meAvatar">U</div>
        <div class="me-text">
          <div class="me-name" id="meName">Loading...</div>
          <div class="me-meta" id="meEmail">...</div>
        </div>
      </div>
      <div class="e2ee-pill">e2e encrypted</div>
    </div>

    <!-- friend search -->
    <div class="search-card">
      <div class="search-title">Search user & send request</div>
      <div class="search-row">
        <input id="searchEmail" class="search-input" type="email" placeholder="Enter email to add friend">
        <button id="searchBtn" class="search-btn">Find</button>
      </div>
      <div class="search-status" id="searchStatus"></div>
    </div>

    <div class="section-title">Chats</div>
    <div id="chatsContainer" class="chat-list"></div>
    <div id="chatsStatus" class="status"></div>
  </div>

  <!-- profile modal -->
  <div id="profileModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">My profile</div>
        <button class="modal-close" onclick="closeProfile()">×</button>
      </div>
      <div class="profile-body">
        <div class="me-avatar" id="profileAvatar">U</div>
        <div id="profileName" class="me-name">User</div>
        <div id="profileEmail" class="me-meta">email</div>

        <div class="profile-qr">
          <canvas id="profileQrCanvas"></canvas>
        </div>
        <div class="profile-meta">
          Scan this QR to send you friend request.
        </div>
      </div>
    </div>
  </div>

  <!-- scanner modal -->
  <div id="scannerModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Scan QR</div>
        <button class="modal-close" onclick="closeScanner()">×</button>
      </div>
      <div class="scanner-body">
        <div id="qr-scanner"></div>
        <div id="scannerStatus" class="status" style="padding-top:8px;"></div>
      </div>
    </div>
  </div>

  <script>
    // TODO: put your own Firebase config
    const firebaseConfig = {
       apiKey: "AIzaSyAFKOgNZgaIZ9q09VvmKJrnEWys7ancSEE",
      authDomain: "web-messager-533ae.firebaseapp.com",
      projectId: "web-messager-533ae",
      storageBucket: "web-messager-533ae.firebasestorage.app",
      messagingSenderId: "466370688536",
      appId: "1:466370688536:web:90e63387db2e4b697ff56d",
      measurementId: "G-Q3136YFH7C"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let html5QrCode = null;

    function avatarLetterFrom(email) {
      if (!email) return "U";
      return email.charAt(0).toUpperCase();
    }

    function renderSelfProfile(user) {
      const letter = avatarLetterFrom(user.email);
      document.getElementById("meAvatar").textContent = letter;
      document.getElementById("meName").textContent = user.displayName || "User";
      document.getElementById("meEmail").textContent = user.email;

      document.getElementById("profileAvatar").textContent = letter;
      document.getElementById("profileName").textContent = user.displayName || "User";
      document.getElementById("profileEmail").textContent = user.email;

      const qr = new QRious({
        element: document.getElementById("profileQrCanvas"),
        value: user.email,
        size: 180
      });
    }

    async function addFriendByEmail(email) {
      if (!currentUser) return;

      if (email === currentUser.email) {
        alert("You cannot add yourself.");
        return;
      }
      const searchStatus = document.getElementById("searchStatus");
      searchStatus.textContent = "Searching...";

      const userSnap = await db.collection("users")
        .where("email", "==", email)
        .limit(1)
        .get();

      if (userSnap.empty) {
        searchStatus.textContent = "User not found.";
        return;
      }
      const friendDoc = userSnap.docs[0];
      const friendId = friendDoc.id;

      const myRef = db.collection("users").doc(currentUser.uid);
      const friendRef = db.collection("users").doc(friendId);

      await db.runTransaction(async (tx) => {
        const relRef = db.collection("relationships").doc();
        tx.set(relRef, {
          users: [currentUser.uid, friendId],
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      });

      searchStatus.textContent = "Friend added.";
    }

    function renderChats() {
      if (!currentUser) return;

      const chatsContainer = document.getElementById("chatsContainer");
      const chatsStatus = document.getElementById("chatsStatus");
      chatsContainer.innerHTML = "";
      chatsStatus.textContent = "Loading chats...";

      db.collection("relationships")
        .where("users", "array-contains", currentUser.uid)
        .orderBy("createdAt", "desc")
        .onSnapshot(async (snap) => {
          chatsContainer.innerHTML = "";
          if (snap.empty) {
            chatsStatus.textContent = "No chats yet. Add a friend using email or QR.";
            return;
          }
          chatsStatus.textContent = "";

          for (const docSnap of snap.docs) {
            const data = docSnap.data();
            const otherId = data.users.find(u => u !== currentUser.uid);
            if (!otherId) continue;

            const otherUser = await db.collection("users").doc(otherId).get();
            const other = otherUser.data();
            const row = document.createElement("div");
            row.className = "chat-row";
            row.onclick = () => {
              window.location.href = "chat.html?rid=" + docSnap.id;
            };

            const avatar = document.createElement("div");
            avatar.className = "chat-avatar";
            avatar.textContent = avatarLetterFrom(other.email || "U");

            const main = document.createElement("div");
            main.className = "chat-main";

            const top = document.createElement("div");
            top.className = "chat-top";

            const name = document.createElement("div");
            name.className = "chat-name";
            name.textContent = other.displayName || other.email || "User";

            const time = document.createElement("div");
            time.className = "chat-time";
            time.textContent = "";

            top.appendChild(name);
            top.appendChild(time);

            const last = document.createElement("div");
            last.className = "chat-last";
            last.textContent = "Tap to open chat";

            main.appendChild(top);
            main.appendChild(last);

            row.appendChild(avatar);
            row.appendChild(main);
            chatsContainer.appendChild(row);
          }
        });
    }

    function openProfile() {
      document.getElementById("profileModal").style.display = "flex";
    }
    function closeProfile() {
      document.getElementById("profileModal").style.display = "none";
    }

    async function startScanner() {
      const scannerStatus = document.getElementById("scannerStatus");
      scannerStatus.textContent = "Initializing camera...";
      const elementId = "qr-scanner";

      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode(elementId); // [page:0][web:307]
      }

      const config = { fps: 10, qrbox: { width: 250, height: 250 } }; // [page:0]
      const cameras = await Html5Qrcode.getCameras(); // [page:0][web:307]
      if (!cameras || cameras.length === 0) {
        scannerStatus.textContent = "No camera found.";
        return;
      }
      const camId = cameras[0].id;

      html5QrCode.start(
        camId,
        config,
        async (decodedText) => {
          scannerStatus.textContent = "Scanned: " + decodedText;
          await addFriendByEmail(decodedText);
          setTimeout(closeScanner, 800);
        },
        (err) => { /* ignore decode errors */ }
      );
    }

    function openScanner() {
      document.getElementById("scannerModal").style.display = "flex";
      startScanner();
    }

    async function closeScanner() {
      document.getElementById("scannerModal").style.display = "none";
      if (html5QrCode && html5QrCode.isScanning) {
        try {
          await html5QrCode.stop();
        } catch (e) {}
      }
      document.getElementById("qr-scanner").innerHTML = "";
    }

    // three-dot menu wiring
    const menuBtn = document.getElementById('menuBtn');
    const topMenu = document.getElementById('topMenu');
    const menuQrScan = document.getElementById('menuQrScan');
    const menuProfile = document.getElementById('menuProfile');
    const menuManual = document.getElementById('menuManual');

    function toggleMenu() {
      topMenu.style.display = topMenu.style.display === 'block' ? 'none' : 'block';
    }
    function closeMenu() {
      topMenu.style.display = 'none';
    }

    menuBtn.onclick = (e) => {
      e.stopPropagation();
      toggleMenu();
    };

    document.addEventListener('click', (e) => {
      if (!topMenu.contains(e.target) && e.target !== menuBtn) {
        closeMenu();
      }
    });

    menuQrScan.onclick = () => {
      closeMenu();
      openScanner();
    };

    menuProfile.onclick = () => {
      closeMenu();
      openProfile();
    };

    menuManual.onclick = () => {
      closeMenu();
      // later you can link to a manual page:
      // window.location.href = "manual.html";
      alert("Manual page coming soon");
    };

    // search button
    document.getElementById("searchBtn").onclick = () => {
      const v = document.getElementById("searchEmail").value.trim();
      if (!v) return;
      addFriendByEmail(v);
    };

    // auth state
    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }
      currentUser = user;
      renderSelfProfile(user);
      renderChats();
    });
  </script>
</body>
</html>
