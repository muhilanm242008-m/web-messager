<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Messenger - Chats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top, #202c33 0, #0b141a 45%, #020c12 100%);
      color: #e9edef;
      min-height: 100vh;
    }
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(15, 23, 30, 0.72);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand-logo {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      background: conic-gradient(from 210deg, #00a884, #00d4aa, #007765, #00a884);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #0b141a;
    }
    .brand-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .brand-title span:first-child {
      font-size: 16px;
      font-weight: 600;
    }
    .brand-title span:last-child {
      font-size: 11px;
      color: #8696a0;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative; /* for menu */
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #e9edef;
      font-size: 16px;
      backdrop-filter: blur(16px);
      transition: background 0.15s, transform 0.15s;
    }
    .icon-btn:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }

    /* three-dot menu */
    .menu {
      position: absolute;
      top: 40px;
      right: 0;
      background: rgba(15, 23, 30, 0.96);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 18px 40px rgba(0,0,0,0.6);
      padding: 6px 0;
      min-width: 160px;
      display: none;
      z-index: 20;
    }
    .menu-item {
      padding: 8px 14px;
      font-size: 14px;
      color: #e9edef;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .menu-item span.icon {
      width: 20px;
      text-align: center;
    }
    .menu-item:hover {
      background: rgba(255,255,255,0.06);
    }

    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 12px 12px 24px;
    }
    @media (min-width: 768px) {
      .main { padding: 16px 20px 32px; }
    }

    .me-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      margin-bottom: 12px;
      border-radius: 20px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .me-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .me-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00a884, #00d4aa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      overflow: hidden;
    }
    .me-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .me-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .me-name {
      font-size: 15px;
      font-weight: 500;
    }
    .me-meta {
      font-size: 12px;
      color: #8696a0;
    }
    .e2ee-pill {
      font-size: 11px;
      color: #00a884;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(0,168,132,0.6);
      background: rgba(0,168,132,0.08);
      text-align: center;
    }

    .search-card {
      margin-top: 8px;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 18px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(20,30,38,0.9);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .search-title {
      font-size: 13px;
      color: #8696a0;
      margin-bottom: 6px;
    }
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .search-input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 16px;
      border: 1px solid transparent;
      background: rgba(32,44,51,0.95);
      color: #e9edef;
      font-size: 14px;
    }
    .search-input::placeholder { color: #8696a0; }
    .search-input:focus {
      outline: none;
      border-color: #00a884;
      box-shadow: 0 0 0 2px rgba(0,168,132,0.35);
    }
    .search-btn {
      padding: 0 10px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #00a884, #00d4aa);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .search-btn:disabled {
      background: #404c55;
      cursor: not-allowed;
    }
    .search-status {
      font-size: 12px;
      color: #8696a0;
      min-height: 1.2em;
    }

    .section-title {
      margin: 10px 2px;
      font-size: 13px;
      color: #8696a0;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .chat-list {
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(15, 23, 30, 0.88);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 18px 40px rgba(0,0,0,0.55);
    }
    .chat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .chat-row:last-child {
      border-bottom: none;
    }
    .chat-row:hover {
      background: rgba(255,255,255,0.04);
    }
    .chat-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00a884, #00d4aa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 18px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .chat-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .chat-main {
      flex: 1;
      min-width: 0;
    }
    .chat-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }
    .chat-name {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-time {
      font-size: 11px;
      color: #8696a0;
      white-space: nowrap;
    }
    .chat-last {
      font-size: 13px;
      color: #8696a0;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      text-align: center;
      font-size: 13px;
      color: #8696a0;
      padding: 12px;
    }
    .status strong { color: #00a884; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }
    .modal {
      width: 100%;
      max-width: 420px;
      max-height: 90vh;
      overflow: hidden;
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(15, 23, 30, 0.92);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
      padding: 18px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .modal-title {
      font-size: 16px;
      font-weight: 500;
    }
    .modal-close {
      border: none;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e9edef;
      cursor: pointer;
      font-size: 16px;
    }

    .profile-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 8px;
    }
    .profile-qr {
      margin-top: 6px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .profile-meta {
      font-size: 13px;
      color: #8696a0;
      text-align: center;
    }
    .scanner-body {
      padding: 6px;
    }
    #qr-scanner {
      width: 100%;
      max-height: 320px;
    }

    /* request bar + small badge reuse your inline style */
  </style>
</head>
<body>
  <div class="top-nav">
    <div class="brand">
      <div class="brand-logo">S</div>
      <div class="brand-title">
        <span>Secure Messenger</span>
        <span>End-to-end encrypted</span>
      </div>
    </div>
    <div class="nav-actions">
      <div id="requestBadge" style="
        display:none;
        min-width:18px;
        padding:2px 6px;
        border-radius:999px;
        background:#f15c5c;
        color:white;
        font-size:10px;
        font-weight:600;
        text-align:center;
      " title="Pending chat requests">0</div>

      <!-- three-dot menu button -->
      <button class="icon-btn" id="menuBtn" title="Menu">⋮</button>

      <!-- dropdown menu -->
      <div class="menu" id="topMenu">
        <div class="menu-item" id="menuAddFriend">
          <span class="icon">➕</span>
          <span>Add friend</span>
        </div>
        <div class="menu-item" id="menuScanQr">
          <span class="icon">🔳</span>
          <span>Scan QR</span>
        </div>
        <div class="menu-item" id="menuSettings">
          <span class="icon">⚙️</span>
          <span>Settings</span>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="me-card">
      <div class="me-info">
        <div class="me-avatar" id="meAvatar">U</div>
        <div class="me-text">
          <div class="me-name" id="meName">Loading...</div>
          <div class="me-meta" id="meMeta">@username · phone</div>
        </div>
      </div>
      <div class="e2ee-pill">🔒 Encrypted chats • Video call ready</div>
    </div>

    <!-- notification bar etc. (unchanged) -->
    <div id="requestBar" style="
      display:none;
      margin:4px 2px 8px;
      padding:8px 10px;
      border-radius:14px;
      background:rgba(250, 238, 190, 0.08);
      border:1px solid rgba(250, 200, 80, 0.4);
      color:#fdd663;
      font-size:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    ">
      <div id="requestBarText">New chat request.</div>
      <div style="display:flex;gap:6px;">
        <button id="requestRejectBtn" class="icon-btn" style="background:#2a3942;">✖</button>
        <button id="requestAcceptBtn" class="icon-btn" style="background:#00a884;">✔</button>
      </div>
    </div>

    <div class="search-card">
      <div class="search-title">Add friend by username or mobile</div>
      <div class="search-row">
        <input id="friendQuery" class="search-input" placeholder="friend username or phone">
        <button id="addFriendBtn" class="search-btn">Send request</button>
      </div>
      <div id="addStatus" class="search-status"></div>
    </div>

    <div class="section-title">Chats</div>
    <div class="chat-list" id="chatList">
      <div class="status"><strong>Loading chats...</strong></div>
    </div>
  </div>

  <!-- profile, scan, qrFriend, incomingReq modals: unchanged from your code -->

  <!-- ... keep ALL your existing modal HTML blocks here, exactly as before ... -->

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAFKOgNZgaIZ9q09VvmKJrnEWys7ancSEE",
      authDomain: "web-messager-533ae.firebaseapp.com",
      projectId: "web-messager-533ae",
      storageBucket: "web-messager-533ae.firebasestorage.app",
      messagingSenderId: "466370688536",
      appId: "1:466370688536:web:90e63387db2e4b697ff56d",
      measurementId: "G-Q3136YFH7C"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUserUID = null;
    let currentUserData = null;
    let qrScanner = null;

    const chatListEl = document.getElementById('chatList');
    const addFriendBtn = document.getElementById('addFriendBtn');
    const addStatusEl = document.getElementById('addStatus');
    const requestBadgeEl = document.getElementById('requestBadge');
    const requestBarEl = document.getElementById('requestBar');
    const requestBarTextEl = document.getElementById('requestBarText');

    let qrScannedFriend = null;
    let qrScannedFriendId = null;
    let incomingReq = null;

    function logout() {
      localStorage.clear();
      auth.signOut().then(() => window.location.href = 'index.html');
    }

    function openProfile() {
      document.getElementById('profileModal').style.display = 'flex';
    }
    function closeProfile() {
      document.getElementById('profileModal').style.display = 'none';
    }

    async function openScanner() {
      document.getElementById('scanModal').style.display = 'flex';
      if (qrScanner) return;
      qrScanner = new Html5Qrcode("qr-scanner");
      try {
        await qrScanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: 220 },
          async (decodedText) => {
            try {
              const data = JSON.parse(decodedText);
              if (!data.uid) return;
              const friendDoc = await db.collection('users').doc(data.uid).get();
              if (!friendDoc.exists) {
                alert('User not found for this QR.');
                return;
              }
              const friend = { id: friendDoc.id, ...friendDoc.data() };
              await closeScanner();
              openQrFriendModal(friend, friendDoc.id);
            } catch (e) {
              console.error(e);
              alert('Failed to handle QR.');
            }
          },
          () => {}
        );
      } catch (e) {
        console.error(e);
        alert('Camera permission denied or scanner error.');
      }
    }

    async function closeScanner() {
      document.getElementById('scanModal').style.display = 'none';
      if (qrScanner) {
        try { await qrScanner.stop(); } catch {}
        try { await qrScanner.clear(); } catch {}
        qrScanner = null;
      }
    }

    // ... keep the rest of your JS: setAddStatus, addFriendRelation,
    // sendFriendRequestTo, startChat, renderSelfProfile, renderChats,
    // openQrFriendModal, accept/reject QR friend, incoming requests,
    // updateRequestUI, initChats, addFriendBtn.onclick, etc.
    // You don't need to change that logic for the menu.

    // three-dot menu logic
    const menuBtn = document.getElementById('menuBtn');
    const topMenu = document.getElementById('topMenu');
    const menuAddFriend = document.getElementById('menuAddFriend');
    const menuScanQr = document.getElementById('menuScanQr');
    const menuSettings = document.getElementById('menuSettings');
    const friendQueryInput = document.getElementById('friendQuery');

    function toggleMenu() {
      topMenu.style.display = topMenu.style.display === 'block' ? 'none' : 'block';
    }

    function closeMenu() {
      topMenu.style.display = 'none';
    }

    menuBtn.onclick = (e) => {
      e.stopPropagation();
      toggleMenu();
    };

    // clicking outside closes menu
    document.addEventListener('click', (e) => {
      if (!topMenu.contains(e.target) && e.target !== menuBtn) {
        closeMenu();
      }
    });

    // menu actions
    menuAddFriend.onclick = () => {
      closeMenu();
      friendQueryInput.focus();
      // optional: scroll to add friend card
      document.querySelector('.search-card')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    menuScanQr.onclick = () => {
      closeMenu();
      openScanner();
    };

    menuSettings.onclick = () => {
      closeMenu();
      openProfile();
    };

    // you already had these lines before for profile & scan:
    // document.getElementById('profileBtn').onclick = openProfile;
    // document.getElementById('scanBtn').onclick = openScanner;
    // They are removed now since we use menu items instead.

    document.addEventListener('DOMContentLoaded', () => {
      // keep your existing setup for accept buttons, badge click, etc.
      const btn1 = document.getElementById('acceptQrFriendBtn');
      if (btn1) btn1.onclick = acceptQrFriend;
      const btn2 = document.getElementById('acceptIncomingReqBtn');
      if (btn2) btn2.onclick = acceptIncomingReq;
      const barAccept = document.getElementById('requestAcceptBtn');
      const barReject = document.getElementById('requestRejectBtn');
      if (barAccept) barAccept.onclick = acceptIncomingReq;
      if (barReject) barReject.onclick = rejectIncomingReq;
      requestBadgeEl.onclick = () => {
        if (incomingReq) openIncomingReqModal(incomingReq, true);
      };
    });

    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      initChats(user);
    });
  </script>
</body>
</html>
