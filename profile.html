<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Messenger - Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>/* Same styles as previous + nav bar */
    body { font-family: -apple-system, sans-serif; background: #111b21; color: #e9edef; height: 100vh; display: flex; flex-direction: column; margin: 0; }
    .top-nav { background: #202c33; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a3942; }
    .nav-btn { background: #00a884; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    .content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; text-align: center; }
    .profile-card { background: #202c33; padding: 30px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #00a884, #00d4aa); font-size: 2.5em; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .profile-info h2 { margin-bottom: 10px; }
    .profile-info p { color: #8696a0; margin-bottom: 20px; }
    .qr-code { width: 200px; height: 200px; background: white; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; margin: 20px 0; font-family: monospace; font-size: 0.9em; }
    .search-section input { padding: 12px; background: #2a3942; border: none; border-radius: 10px; color: white; width: 300px; margin-right: 10px; }
    .search-section button { background: #00a884; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; }
    .friends-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; width: 100%; max-width: 800px; }
    .friend-card { background: #202c33; padding: 20px; border-radius: 15px; cursor: pointer; transition: transform 0.2s; }
    .friend-card:hover { transform: translateY(-5px); }
    .friend-avatar { width: 60px; height: 60px; border-radius: 50%; background: #00a884; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
  </style>
</head>
<body>
  <div class="top-nav">
    <button class="nav-btn" onclick="window.location.href='index.html'">← Logout</button>
    <h2>Profile & Friends</h2>
  </div>
  <div class="content">
    <div class="profile-card">
      <div class="avatar" id="userAvatar">U</div>
      <div class="profile-info">
        <h2 id="userName">Loading...</h2>
        <p id="userEmail">Loading...</p>
      </div>
      <div class="qr-code" id="qrCode">Loading QR...</div>
    </div>
    <div class="search-section">
      <input type="email" id="friendEmail" placeholder="Enter friend's Gmail...">
      <button onclick="addFriend()">➕ Add & Chat</button>
    </div>
    <div class="friends-grid" id="friendsList">Loading friends...</div>
  </div>

  <script>
    const firebaseConfig = {   apiKey: "AIzaSyAFKOgNZgaIZ9q09VvmKJrnEWys7ancSEE",
  authDomain: "web-messager-533ae.firebaseapp.com",
  projectId: "web-messager-533ae",
  storageBucket: "web-messager-533ae.firebasestorage.app",
  messagingSenderId: "466370688536",
  appId: "1:466370688536:web:90e63387db2e4b697ff56d",
  measurementId: "G-Q3136YFH7C" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const userUID = localStorage.getItem('userUID');
    if (!userUID) window.location.href = 'index.html';

    async function renderProfile() {
      const userEmail = localStorage.getItem('userEmail');
      const userName = localStorage.getItem('userName');
      document.getElementById('userAvatar').textContent = userEmail[0].toUpperCase();
      document.getElementById('userName').textContent = userName;
      document.getElementById('userEmail').textContent = userEmail;
      document.getElementById('qrCode').textContent = userUID.slice(0,12) + '\nShare this ID';

      // Load friends
      const snap = await db.collection('users').where('email', '!=', userEmail).limit(12).get();
      const list = document.getElementById('friendsList');
      list.innerHTML = '';
      snap.forEach(doc => {
        const friend = doc.data();
        const card = document.createElement('div');
        card.className = 'friend-card';
        card.onclick = () => {
          localStorage.setItem('selectedFriend', JSON.stringify({id: doc.id, ...friend}));
          window.location.href = 'chat.html';
        };
        card.innerHTML = `
          <div class="friend-avatar">${friend.email[0].toUpperCase()}</div>
          <h4>${friend.name}</h4>
          <p>${friend.email}</p>
        `;
        list.appendChild(card);
      });
    }

    async function addFriend() {
      const email = document.getElementById('friendEmail').value.trim();
      if (!email) return alert('Enter email');
      const snap = await db.collection('users').where('email', '==', email).get();
      if (snap.empty) return alert('User not found');
      const friend = {id: snap.docs[0].id, ...snap.docs[0].data()};
      localStorage.setItem('selectedFriend', JSON.stringify(friend));
      window.location.href = 'chat.html';
    }

    renderProfile();
  </script>
</body>
</html>
