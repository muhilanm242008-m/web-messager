<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Messenger - Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <!-- QR code library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #111b21 0%, #202c33 100%);
      color: #e9edef;
      min-height: 100vh;
    }
    .top-nav {
      background: rgba(32, 44, 51, 0.95);
      backdrop-filter: blur(20px);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a3942;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-btn {
      background: none;
      color: #e9edef;
      border: 1px solid #2a3942;
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
    }
    .nav-btn:hover { background: #2a3942; }
    .page-title { font-size: 18px; font-weight: 600; }

    .content {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    @media (min-width: 768px) {
      .content {
        padding: 32px;
      }
    }

    .profile-card {
      background: rgba(32, 44, 51, 0.9);
      backdrop-filter: blur(20px);
      padding: 24px;
      border-radius: 20px;
      margin-bottom: 24px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00a884, #00d4aa);
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6em;
      font-weight: bold;
      overflow: hidden;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-info h2 {
      font-size: 22px;
      margin-bottom: 6px;
    }
    .profile-info p {
      color: #8696a0;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .qr-section {
      margin-top: 16px;
      background: rgba(255,255,255,0.03);
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .qr-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    .search-section {
      background: rgba(32, 44, 51, 0.9);
      padding: 24px;
      border-radius: 20px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .search-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(42, 57, 66, 0.95);
      border: 1px solid transparent;
      border-radius: 16px;
      color: white;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .search-input:focus {
      outline: none;
      border-color: #00a884;
      box-shadow: 0 0 0 3px rgba(0,168,132,0.3);
    }
    .add-friend-btn {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #00a884, #00d4aa);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .add-friend-btn:disabled {
      background: #404c55;
      cursor: not-allowed;
    }

    .friends-section-title {
      margin: 4px 0 12px;
      font-size: 18px;
    }
    .friends-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
    }
    .friend-card {
      background: rgba(32, 44, 51, 0.9);
      padding: 16px;
      border-radius: 16px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .friend-card:hover {
      border-color: #00a884;
      background: rgba(32, 44, 51, 1);
    }
    .friend-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00a884, #00d4aa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 18px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .friend-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .friend-details h4 {
      margin: 0 0 3px;
      font-size: 15px;
    }
    .friend-meta {
      font-size: 12px;
      color: #8696a0;
    }

    .status {
      text-align: center;
      font-size: 13px;
      color: #8696a0;
      padding: 8px 0;
    }
    .loading { color: #00a884; }
  </style>
</head>
<body>
  <div class="top-nav">
    <button class="nav-btn" onclick="logout()">Logout</button>
    <div class="page-title">My Profile & Friends</div>
    <div style="width:72px;"></div>
  </div>

  <div class="content">
    <!-- Profile card -->
    <div class="profile-card">
      <div class="avatar" id="userAvatar">U</div>
      <div class="profile-info">
        <h2 id="userName">Loading...</h2>
        <p id="userUsername">@username</p>
        <p id="userPhone">Phone</p>
      </div>
      <div class="qr-section">
        <div class="qr-wrapper">
          <canvas id="qrCanvas" width="160" height="160"></canvas>
        </div>
        <p style="font-size:12px; color:#8696a0;">
          Friends can scan this QR, or search your username / mobile number.
        </p>
      </div>
    </div>

    <!-- Add friend -->
    <div class="search-section">
      <h3 style="margin-bottom:10px; font-size:18px;">➕ Add Friend</h3>
      <input
        type="text"
        id="friendQuery"
        class="search-input"
        placeholder="Enter friend's username or mobile number">
      <button id="addFriendBtn" class="add-friend-btn">🔍 Search & Add & Chat</button>
      <div id="addStatus" class="status" style="display:none;"></div>
    </div>

    <!-- Friends list -->
    <div>
      <h3 class="friends-section-title">👥 Your Friends</h3>
      <div class="friends-grid" id="friendsList">
        <div class="status loading">Loading friends...</div>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAFKOgNZgaIZ9q09VvmKJrnEWys7ancSEE",
      authDomain: "web-messager-533ae.firebaseapp.com",
      projectId: "web-messager-533ae",
      storageBucket: "web-messager-533ae.firebasestorage.app",
      messagingSenderId: "466370688536",
      appId: "1:466370688536:web:90e63387db2e4b697ff56d",
      measurementId: "G-Q3136YFH7C"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUserUID = null;
    let currentUserData = null;

    function logout() {
      localStorage.clear();
      auth.signOut().then(() => {
        window.location.href = 'index.html';
      });
    }

    function showStatus(message, type) {
      const statusEl = document.getElementById('addStatus');
      statusEl.innerHTML = message;
      const colors = {
        success: '#00a884',
        error: '#ff6b6b',
        warning: '#f4b400',
        info: '#4285f4'
      };
      statusEl.style.color = colors[type] || '#8696a0';
      statusEl.style.display = 'block';
      setTimeout(() => { statusEl.style.display = 'none'; }, 5000);
    }

    async function renderProfile(user) {
      currentUserUID = user.uid;

      const doc = await db.collection('users').doc(user.uid).get();
      if (!doc.exists) {
        window.location.href = 'setup.html';
        return;
      }

      currentUserData = doc.data();
      const name = currentUserData.name || currentUserData.username || user.email;
      const username = currentUserData.username || '';
      const phone = currentUserData.phone || '';
      const photo = currentUserData.photo || '';

      localStorage.setItem('userName', name);
      localStorage.setItem('userUsername', username);
      localStorage.setItem('userPhone', phone);
      localStorage.setItem('userPhoto', photo);

      document.getElementById('userName').textContent = name;
      document.getElementById('userUsername').textContent = username ? '@' + username : '';
      document.getElementById('userPhone').textContent = phone;

      const avatarEl = document.getElementById('userAvatar');
      if (photo) {
        avatarEl.innerHTML = '<img src="' + photo + '" alt="avatar">';
      } else {
        avatarEl.textContent = (name[0] || 'U').toUpperCase();
      }

      const qrValue = JSON.stringify({
        uid: currentUserUID,
        username,
        phone
      });
      new QRious({
        element: document.getElementById('qrCanvas'),
        value: qrValue,
        size: 160,
        level: 'H'
      });

      await loadFriends();
    }

    async function loadFriends() {
      const friendsList = document.getElementById('friendsList');
      friendsList.innerHTML = '<div class="status loading">Loading friends...</div>';

      try {
        const snapshot = await db.collection('users')
          .doc(currentUserUID)
          .collection('friends')
          .orderBy('friendName')
          .limit(50)
          .get();

        friendsList.innerHTML = '';

        if (snapshot.empty) {
          friendsList.innerHTML = '<div class="status">No friends yet. Add some above 👆</div>';
          return;
        }

        snapshot.forEach((doc) => {
          const friend = doc.data();
          const friendCard = document.createElement('div');
          friendCard.className = 'friend-card';
          friendCard.onclick = () => startChat(friend, friend.friendUid);

          const displayName =
            friend.friendName || friend.friendUsername || friend.friendPhone || 'Friend';
          const initials = displayName[0].toUpperCase();
          const avatarHtml = friend.friendPhoto
            ? `<img src="${friend.friendPhoto}" alt="avatar">`
            : initials;

          friendCard.innerHTML = `
            <div class="friend-avatar">${avatarHtml}</div>
            <div class="friend-details">
              <h4>${displayName}</h4>
              <div class="friend-meta">
                ${friend.friendUsername ? '@' + friend.friendUsername : ''}
                ${friend.friendPhone ? ' · ' + friend.friendPhone : ''}
              </div>
            </div>
          `;
          friendsList.appendChild(friendCard);
        });
      } catch (error) {
        console.error('Load friends error:', error);
        friendsList.innerHTML =
          `<div class="status" style="color:#ff6b6b;">❌ Error: ${error.message}</div>`;
      }
    }

    async function addFriendRelation(friend, friendId) {
      const batch = db.batch();
      const myUid = currentUserUID;
      const myDoc = currentUserData;

      const myFriendRef = db.collection('users').doc(myUid)
        .collection('friends').doc(friendId);
      const theirFriendRef = db.collection('users').doc(friendId)
        .collection('friends').doc(myUid);

      const now = firebase.firestore.FieldValue.serverTimestamp();

      batch.set(myFriendRef, {
        friendUid: friendId,
        friendName: friend.name || friend.username || friend.phone || friend.email,
        friendUsername: friend.username || '',
        friendPhone: friend.phone || '',
        friendPhoto: friend.photo || '',
        createdAt: now
      }, { merge: true });

      batch.set(theirFriendRef, {
        friendUid: myUid,
        friendName: myDoc.name || myDoc.username || myDoc.phone || myDoc.email,
        friendUsername: myDoc.username || '',
        friendPhone: myDoc.phone || '',
        friendPhoto: myDoc.photo || '',
        createdAt: now
      }, { merge: true });

      await batch.commit();
    }

    function startChat(friend, friendId) {
      localStorage.setItem('selectedFriend', JSON.stringify({
        id: friendId,
        name: friend.name || friend.friendName || friend.username || friend.friendUsername || friend.phone,
        username: friend.username || friend.friendUsername || '',
        phone: friend.phone || friend.friendPhone || ''
      }));
      window.location.href = 'chat.html';
    }

    document.getElementById('addFriendBtn').onclick = async function() {
      const query = document.getElementById('friendQuery').value.trim();
      const btn = this;

      if (!query) {
        showStatus('⚠️ Please enter username or mobile number', 'warning');
        return;
      }

      btn.disabled = true;
      showStatus('<span class="loading">Searching...</span>', 'info');

      try {
        let snapshot;
        if (/^\d+$/.test(query)) {
          snapshot = await db.collection('users')
            .where('phone', '==', query).limit(1).get();
        } else {
          snapshot = await db.collection('users')
            .where('username', '==', query.toLowerCase()).limit(1).get();
        }

        if (snapshot.empty) {
          showStatus(
            `👤 No account found for <strong>${query}</strong><br><small>Ask them to sign in & setup profile</small>`,
            'info'
          );
          return;
        }

        const friendDoc = snapshot.docs[0];
        const friend = { id: friendDoc.id, ...friendDoc.data() };

        if (friendDoc.id === currentUserUID) {
          showStatus('⚠️ You cannot add yourself', 'warning');
          return;
        }

        await addFriendRelation(friend, friendDoc.id);
        showStatus('✅ Friend added. Opening chat...', 'success');
        startChat(friend, friendDoc.id);
      } catch (err) {
        console.error('Add friend error:', err);
        showStatus(`❌ Error: ${err.message}`, 'error');
      } finally {
        btn.disabled = false;
      }
    };

    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      renderProfile(user);
    });
  </script>
</body>
</html>
