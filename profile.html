<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Messenger - Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(135deg, #111b21 0%, #202c33 100%); 
      color: #e9edef; 
      min-height: 100vh; 
    }
    .top-nav { 
      background: rgba(32, 44, 51, 0.95); 
      backdrop-filter: blur(20px); 
      padding: 16px 24px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-bottom: 1px solid #2a3942; 
      position: sticky; 
      top: 0; 
      z-index: 100; 
    }
    .nav-btn { 
      background: linear-gradient(135deg, #00a884, #00d4aa); 
      color: white; 
      border: none; 
      padding: 12px 24px; 
      border-radius: 25px; 
      cursor: pointer; 
      font-weight: 500; 
      transition: all 0.3s; 
    }
    .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,168,132,0.4); }
    .page-title { font-size: 24px; font-weight: 600; }
    .content { 
      max-width: 900px; 
      margin: 0 auto; 
      padding: 40px 24px; 
    }
    .profile-card { 
      background: rgba(32, 44, 51, 0.9); 
      backdrop-filter: blur(25px); 
      padding: 48px; 
      border-radius: 28px; 
      margin-bottom: 48px; 
      text-align: center; 
      box-shadow: 0 25px 80px rgba(0,0,0,0.4); 
      border: 1px solid rgba(255,255,255,0.1); 
    }
    .avatar { 
      width: 140px; 
      height: 140px; 
      border-radius: 50%; 
      background: linear-gradient(135deg, #00a884, #00d4aa); 
      margin: 0 auto 28px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 3.5em; 
      font-weight: bold; 
      box-shadow: 0 15px 50px rgba(0,168,132,0.4); 
      border: 4px solid rgba(255,255,255,0.2); 
    }
    .profile-info h2 { 
      font-size: 32px; 
      margin-bottom: 16px; 
      background: linear-gradient(135deg, #ffffff, #e9edef); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
      background-clip: text; 
    }
    .profile-info p { 
      color: #8696a0; 
      font-size: 18px; 
      margin-bottom: 32px; 
    }
    .qr-section { 
      background: rgba(255,255,255,0.08); 
      padding: 32px; 
      border-radius: 20px; 
      margin: 32px 0; 
      border: 1px solid rgba(255,255,255,0.15); 
    }
    #qrContainer { text-align: center; margin-bottom: 20px; }
    #qrCanvas { 
      border-radius: 20px; 
      box-shadow: 0 12px 40px rgba(0,0,0,0.4); 
      background: white; 
    }
    .qr-id { 
      font-family: 'Courier New', monospace; 
      font-size: 13px; 
      color: #667781; 
      word-break: break-all; 
      padding: 16px; 
      background: rgba(255,255,255,0.06); 
      border-radius: 12px; 
      margin-top: 16px; 
    }
    .search-section { 
      background: rgba(32, 44, 51, 0.9); 
      padding: 40px; 
      border-radius: 24px; 
      margin-bottom: 48px; 
      box-shadow: 0 15px 50px rgba(0,0,0,0.3); 
      border: 1px solid rgba(255,255,255,0.1); 
    }
    .search-section h3 { 
      color: white; 
      font-size: 26px; 
      margin-bottom: 28px; 
      text-align: center; 
    }
    .search-input { 
      width: 100%; 
      padding: 20px 28px; 
      background: rgba(42, 57, 66, 0.9); 
      border: 2px solid transparent; 
      border-radius: 20px; 
      color: white; 
      font-size: 18px; 
      margin-bottom: 24px; 
      transition: all 0.3s; 
    }
    .search-input:focus { 
      outline: none; 
      border-color: #00a884; 
      box-shadow: 0 0 0 4px rgba(0,168,132,0.25); 
      background: rgba(42, 57, 66, 1); 
    }
    .search-input::placeholder { color: #8696a0; }
    .add-friend-btn { 
      width: 100%; 
      padding: 20px 40px; 
      background: linear-gradient(135deg, #00a884, #00d4aa); 
      color: white; 
      border: none; 
      border-radius: 20px; 
      font-size: 20px; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.3s; 
      box-shadow: 0 10px 30px rgba(0,168,132,0.3); 
    }
    .add-friend-btn:hover:not(:disabled) { 
      transform: translateY(-4px); 
      box-shadow: 0 20px 50px rgba(0,168,132,0.5); 
    }
    .add-friend-btn:disabled { 
      background: #404c55; 
      cursor: not-allowed; 
      transform: none; 
      box-shadow: none; 
    }
    .friends-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
      gap: 28px; 
    }
    .friend-card { 
      background: rgba(32, 44, 51, 0.9); 
      padding: 32px; 
      border-radius: 24px; 
      cursor: pointer; 
      transition: all 0.3s; 
      border: 1px solid rgba(255,255,255,0.15); 
      backdrop-filter: blur(15px); 
    }
    .friend-card:hover { 
      transform: translateY(-10px) scale(1.02); 
      box-shadow: 0 25px 70px rgba(0,0,0,0.5); 
      border-color: #00a884; 
    }
    .friend-avatar { 
      width: 80px; 
      height: 80px; 
      border-radius: 50%; 
      background: linear-gradient(135deg, #00a884, #00d4aa); 
      margin: 0 auto 24px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 1.8em; 
      font-weight: bold; 
      box-shadow: 0 10px 35px rgba(0,168,132,0.4); 
    }
    .friend-card h4 { 
      font-size: 22px; 
      margin-bottom: 12px; 
      text-align: center; 
    }
    .friend-email { 
      color: #8696a0; 
      font-size: 16px; 
      text-align: center; 
      word-break: break-all; 
      padding: 8px 0; 
    }
    .status { 
      text-align: center; 
      padding: 40px 20px; 
      color: #8696a0; 
      font-size: 16px; 
    }
    .loading { color: #00a884; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div class="top-nav">
    <button class="nav-btn" onclick="logout()">← Logout</button>
    <h2 class="page-title">My Profile & Friends</h2>
    <div style="width: 120px;"></div>
  </div>

  <div class="content">
    <!-- Profile Card -->
    <div class="profile-card">
      <div class="avatar" id="userAvatar">U</div>
      <div class="profile-info">
        <h2 id="userName">Loading...</h2>
        <p id="userEmail">Loading...</p>
      </div>
      
      <!-- REAL QR CODE -->
      <div class="qr-section">
        <div id="qrContainer">
          <div style="font-size: 16px; color: #8696a0; margin-bottom: 16px; font-weight: 500;">
            📱 Your Unique QR Code
          </div>
          <canvas id="qrCanvas" width="240" height="240"></canvas>
        </div>
        <div class="qr-id" id="qrText">Generating QR...</div>
        <p style="color: #8696a0; font-size: 15px; margin-top: 20px;">
          Friends scan QR or search your email to chat instantly
        </p>
      </div>
    </div>

    <!-- Add Friend Section -->
    <div class="search-section">
      <h3>➕ Add Friend by Gmail</h3>
      <input 
        type="email" 
        id="friendEmail" 
        class="search-input" 
        placeholder="Enter friend's Gmail address (e.g. friend@gmail.com)"
      >
      <button id="addFriendBtn" class="add-friend-btn">🔍 Search & Start Chat</button>
      <div id="addStatus" class="status" style="display: none; font-size: 15px;"></div>
    </div>

    <!-- Friends List -->
    <div>
      <h3 style="color: white; font-size: 26px; margin-bottom: 32px; text-align: center;">
        👥 Your Friends
      </h3>
      <div class="friends-grid" id="friendsList">
        <div class="status loading">🔍 Loading friends from database...</div>
      </div>
    </div>
  </div>

  <script>
    // === YOUR FIREBASE CONFIG (REPLACE ALL VALUES) ===
    const firebaseConfig = {
         apiKey: "AIzaSyAFKOgNZgaIZ9q09VvmKJrnEWys7ancSEE",
  authDomain: "web-messager-533ae.firebaseapp.com",
  projectId: "web-messager-533ae",
  storageBucket: "web-messager-533ae.firebasestorage.app",
  messagingSenderId: "466370688536",
  appId: "1:466370688536:web:90e63387db2e4b697ff56d",
  measurementId: "G-Q3136YFH7C"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUserUID = localStorage.getItem('userUID');
    let currentUserEmail = localStorage.getItem('userEmail');
    let currentUserName = localStorage.getItem('userName');

    // === LOGOUT ===
    function logout() {
      if (confirm('Logout and clear data?')) {
        localStorage.clear();
        auth.signOut().then(() => {
          window.location.href = 'index.html';
        });
      }
    }

    // === GENERATE REAL QR CODE ===
    async function generateQR() {
      try {
        const qrData = `${currentUserEmail}|${currentUserUID}`;
        const qrTextEl = document.getElementById('qrText');
        const qrCanvas = document.getElementById('qrCanvas');
        
        qrTextEl.textContent = `Email: ${currentUserEmail}\nID: ${currentUserUID.slice(0,16)}...`;
        
        // Load QR library
        const qrScript = document.createElement('script');
        qrScript.src = 'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js';
        document.head.appendChild(qrScript);
        
        qrScript.onload = () => {
          QRCode.toCanvas(qrCanvas, qrData, {
            width: 240,
            margin: 3,
            color: { dark: '#1f2a37', light: '#ffffff' }
          }, (error) => {
            if (error) {
              qrCanvas.style.display = 'none';
              qrTextEl.innerHTML = `
                <div style="font-size: 48px; margin-bottom: 20px;">📱</div>
                <div>${currentUserEmail}</div>
                <div style="font-size: 13px; opacity: 0.8;">ID: ${currentUserUID.slice(0,16)}...</div>
              `;
            }
          });
        };
      } catch (error) {
        console.error('QR error:', error);
      }
    }

    // === RENDER PROFILE ===
    async function renderProfile() {
      if (!currentUserUID || !currentUserEmail) {
        window.location.href = 'index.html';
        return;
      }

      // Update UI
      document.getElementById('userAvatar').textContent = currentUserEmail[0].toUpperCase();
      document.getElementById('userName').textContent = currentUserName;
      document.getElementById('userEmail').textContent = currentUserEmail;

      // Save user to Firestore
      try {
        await db.collection('users').doc(currentUserUID).set({
          email: currentUserEmail.toLowerCase(),
          name: currentUserName,
          uid: currentUserUID,
          photo: '',
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        console.log('✅ Profile saved to Firestore');
      } catch (error) {
        console.error('Profile save error:', error);
      }

      // Load QR & Friends
      generateQR();
      await loadFriends();
    }

    // === LOAD FRIENDS (SIMPLE - NO INDEX) ===
    async function loadFriends() {
      const friendsList = document.getElementById('friendsList');
      friendsList.innerHTML = '<div class="status loading">🔍 Finding friends...</div>';

      try {
        const snapshot = await db.collection('users').limit(25).get();
        const otherUsers = [];

        snapshot.forEach((doc) => {
          const user = doc.data();
          if (user.email && user.email.toLowerCase() !== currentUserEmail.toLowerCase()) {
            otherUsers.push({ id: doc.id, ...user });
          }
        });

        if (otherUsers.length === 0) {
          friendsList.innerHTML = `
            <div class="status" style="text-align: center; padding: 60px;">
              <div style="font-size: 56px; margin-bottom: 24px;">👥</div>
              <div style="font-size: 22px; margin-bottom: 12px;">No friends yet!</div>
              <div style="font-size: 16px; opacity: 0.9; max-width: 400px; margin: 0 auto;">
                📧 Use search above to add friends by Gmail<br>
                📱 Or share your QR code
              </div>
            </div>
          `;
          return;
        }

        // Sort alphabetically
        otherUsers.sort((a, b) => 
          (a.name || a.email).toLowerCase().localeCompare((b.name || b.email).toLowerCase())
        );

        friendsList.innerHTML = '';
        otherUsers.slice(0, 12).forEach((friend) => {
          const friendCard = document.createElement('div');
          friendCard.className = 'friend-card';
          friendCard.title = `Chat with ${friend.email}`;
          friendCard.onclick = () => startChat(friend, friend.id);
          friendCard.innerHTML = `
            <div class="friend-avatar">${(friend.email[0] || 'U').toUpperCase()}</div>
            <h4>${friend.name || friend.email.split('@')[0]}</h4>
            <div class="friend-email">${friend.email}</div>
          `;
          friendsList.appendChild(friendCard);
        });

      } catch (error) {
        console.error('Friends load error:', error);
        friendsList.innerHTML = `
          <div class="status" style="color: #ff6b6b;">
            ❌ Error loading friends<br>
            <small>Open browser console (F12) for details</small>
          </div>
        `;
      }
    }

    // === START CHAT ===
    function startChat(friend, friendId) {
      localStorage.setItem('selectedFriend', JSON.stringify({
        id: friendId,
        name: friend.name || friend.email.split('@')[0],
        email: friend.email
      }));
      
      const statusEl = document.getElementById('addStatus');
      statusEl.innerHTML = `✅ Opening secure chat with ${friend.name || friend.email}...`;
      statusEl.style.color = '#00a884';
      statusEl.style.display = 'block';
      
      setTimeout(() => {
        window.location.href = 'chat.html';
      }, 800);
    }

    // === ADD FRIEND BY EMAIL ===
    document.getElementById('addFriendBtn').onclick = async function() {
      const email = document.getElementById('friendEmail').value.trim().toLowerCase();
      const btn = this;
      const statusEl = document.getElementById('addStatus');
      
      if (!email || !email.includes('@') || !email.includes('.')) {
        statusEl.innerHTML = '⚠️ Please enter valid Gmail address';
        statusEl.style.color = '#f4b400';
        statusEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = '🔍 Searching...';
      statusEl.style.display = 'block';
      statusEl.innerHTML = '<div class="loading">Checking database...</div>';

      try {
        const snapshot = await db.collection('users')
          .where('email', '==', email)
          .limit(1)
          .get();

        if (snapshot.empty) {
          statusEl.innerHTML = `
            👤 No account found for <strong>${email}</strong><br>
            <small style="opacity: 0.9;">💡 Ask them to login first using this app</small>
          `;
          statusEl.style.color = '#4285f4';
          return;
        }

        const friendDoc = snapshot.docs[0];
        const friend = { id: friendDoc.id, ...friendDoc.data() };
        
        console.log('✅ Friend found:', friend);
        startChat(friend, friendDoc.id);

      } catch (error) {
        console.error('Search error:', error);
        statusEl.innerHTML = `❌ Error: ${error.message}`;
        statusEl.style.color = '#ff6b6b';
      } finally {
        btn.disabled = false;
        btn.textContent = '🔍 Search & Start Chat';
      }
    };

    // === INIT ===
    window.addEventListener('load', () => {
      renderProfile();
    });

    auth.onAuthStateChanged((user) => {
      if (!user && !currentUserUID) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
