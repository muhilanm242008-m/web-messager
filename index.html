<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Web Messenger Minimal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #111b21; color: #e9edef; }
    .app { display: flex; height: 100vh; max-height: 100vh; }
    .sidebar { width: 30%; min-width: 260px; background: #202c33; border-right: 1px solid #202c33; display: flex; flex-direction: column; }
    .sidebar-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; background: #202c33; }
    .sidebar-header .user { font-size: 14px; font-weight: 600; }
    .sidebar-header button { padding: 6px 10px; border-radius: 4px; border: none; background: #00a884; color: #fff; cursor: pointer; font-size: 12px; }
    .friends-header { padding: 8px 12px; font-size: 13px; color: #8696a0; border-top: 1px solid #111b21; border-bottom: 1px solid #111b21; }
    .friends-list { flex: 1; overflow-y: auto; }
    .friend-item { padding: 10px 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .friend-item:hover { background: #18252f; }
    .friend-avatar { width: 32px; height: 32px; border-radius: 50%; background: #2a3942; overflow: hidden; }
    .friend-name { font-size: 14px; }
    .friend-email { font-size: 11px; color: #8696a0; }
    .add-friend { padding: 10px 14px; border-top: 1px solid #111b21; }
    .add-friend input { width: 100%; padding: 8px 10px; border-radius: 6px; border: none; outline: none; font-size: 13px; background: #2a3942; color: #e9edef; margin-bottom: 6px; }
    .add-friend button { width: 100%; padding: 7px 10px; border-radius: 6px; border: none; background: #00a884; color: #fff; font-size: 13px; cursor: pointer; }
    .chat-area { flex: 1; background: #0b141a; display: flex; flex-direction: column; }
    .chat-header { padding: 12px 16px; border-bottom: 1px solid #202c33; display: flex; justify-content: space-between; align-items: center; background: #202c33; font-size: 14px; }
    .room-name { font-weight: 600; }
    .status { font-size: 12px; color: #8696a0; }
    .messages { flex: 1; padding: 12px; overflow-y: auto; background-image: radial-gradient(#202c33 1px, transparent 0); background-size: 24px 24px; background-color: #0b141a; }
    .msg { max-width: 70%; margin-bottom: 8px; padding: 6px 8px; border-radius: 6px; font-size: 13px; line-height: 1.4; position: relative; word-wrap: break-word; }
    .msg.me { margin-left: auto; background: #005c4b; }
    .msg.them { margin-right: auto; background: #202c33; }
    .msg .meta { display: flex; justify-content: flex-end; font-size: 10px; color: #d1d7db; margin-top: 2px; opacity: 0.8; }
    .input-area { display: flex; padding: 8px 10px; gap: 8px; border-top: 1px solid #202c33; background: #202c33; }
    .input-area input { flex: 1; padding: 8px 10px; border-radius: 20px; border: none; outline: none; font-size: 14px; background: #2a3942; color: #e9edef; }
    .input-area button { padding: 8px 16px; border-radius: 20px; border: none; background: #00a884; color: #fff; font-weight: 600; cursor: pointer; }
    .centered { margin: auto; text-align: center; color: #8696a0; font-size: 14px; }
    .centered button { margin-top: 12px; padding: 8px 16px; border-radius: 4px; border: none; background: #00a884; color: #fff; cursor: pointer; font-weight: 600; }
    @media (max-width: 768px) { .sidebar { display: none; } .app { display: block; } .chat-area { height: 100vh; } }
  </style>
</head>
<body>
<div id="app-root"></div>

<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAFKOgNZgaIZ9q09VvmKJrnEWys7ancSEE",
  authDomain: "web-messager-533ae.firebaseapp.com",
  projectId: "web-messager-533ae",
  storageBucket: "web-messager-533ae.firebasestorage.app",
  messagingSenderId: "466370688536",
  appId: "1:466370688536:web:90e63387db2e4b697ff56d",
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const root = document.getElementById('app-root');

  let currentUser = null;
  let selectedChatId = null;
  let selectedFriend = null;
  let unsubscribeMessages = null;
  window._cachedMessages = [];

  auth.onAuthStateChanged(async user => {
    console.log("onAuthStateChanged:", user ? user.email : null);
    currentUser = user;
    if (user) {
      await ensureUserProfile(user);
    }
    await renderApp();
  });

  async function ensureUserProfile(user) {
    const ref = db.collection("users").doc(user.uid);
    const snap = await ref.get();
    if (!snap.exists) {
      await ref.set({
        displayName: user.displayName || "",
        email: user.email || "",
        photoURL: user.photoURL || "",
        qrCodeId: user.uid,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
  }

  function signIn() {
    const provider = new firebase.auth.GoogleAuthProvider();
    console.log("Starting Google sign-in...");
    auth.signInWithPopup(provider)
      .then(result => {
        console.log("Signed in as:", result.user && result.user.email);
        alert("Signed in as: " + (result.user && result.user.email));
      })
      .catch(err => {
        console.error("Sign-in error:", err.code, err.message);
        alert("Sign-in error: " + err.code + " - " + err.message);
      });
  }

  function signOut() {
    if (unsubscribeMessages) unsubscribeMessages();
    auth.signOut()
      .then(() => console.log("Signed out"))
      .catch(err => console.error("Sign-out error:", err));
  }

  function chatIdFor(u1, u2) {
    return [u1, u2].sort().join("_");
  }

  async function createOrGetChatWith(friendUser) {
    const myId = currentUser.uid;
    const friendId = friendUser.id;
    const id = chatIdFor(myId, friendId);
    const ref = db.collection("chats").doc(id);
    const snap = await ref.get();
    if (!snap.exists) {
      await ref.set({
        members: [myId, friendId],
        memberEmails: [currentUser.email, friendUser.email],
        lastMessage: "",
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    selectedChatId = id;
    selectedFriend = friendUser;
    subscribeMessages();
    await renderApp();
  }

  function subscribeMessages() {
    if (!selectedChatId) return;
    if (unsubscribeMessages) unsubscribeMessages();
    unsubscribeMessages = db.collection("chats")
      .doc(selectedChatId)
      .collection("messages")
      .orderBy("createdAt", "asc")
      .onSnapshot(snap => {
        window._cachedMessages = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderMessages();
      }, err => {
        console.error("Messages subscribe error:", err);
      });
  }

  async function sendMessage(text) {
    if (!currentUser || !selectedChatId || !selectedFriend || !text.trim()) return;
    const msg = {
      from: currentUser.uid,
      to: selectedFriend.id,
      text: text.trim(),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    const chatRef = db.collection("chats").doc(selectedChatId);
    const msgsRef = chatRef.collection("messages");
    await msgsRef.add(msg);
    await chatRef.set({
      lastMessage: msg.text,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  }

  async function addFriendByEmail() {
    const input = document.getElementById("addFriendEmail");
    if (!input) return;
    const email = input.value.trim().toLowerCase();
    if (!email) return;
    if (email === (currentUser.email || "").toLowerCase()) {
      alert("You cannot add yourself.");
      return;
    }

    const q = await db.collection("users").where("email", "==", email).limit(1).get();
    if (q.empty) {
      alert("No user found with that email.");
      return;
    }
    const friendDoc = q.docs[0];
    const friendUser = { id: friendDoc.id, ...friendDoc.data() };
    input.value = "";
    await createOrGetChatWith(friendUser);
  }

  async function fetchFriends() {
    if (!currentUser) return [];
    const q = await db.collection("chats")
      .where("members", "array-contains", currentUser.uid)
      .orderBy("updatedAt", "desc")
      .get();

    const chats = [];
    for (const doc of q.docs) {
      const data = doc.data();
      const otherId = data.members.find(m => m !== currentUser.uid);
      if (!otherId) continue;
      const userSnap = await db.collection("users").doc(otherId).get();
      if (!userSnap.exists) continue;
      chats.push({
        chatId: doc.id,
        userId: otherId,
        ...userSnap.data(),
        lastMessage: data.lastMessage || ""
      });
    }
    return chats;
  }

  async function renderApp() {
    if (!currentUser) {
      root.innerHTML = `
        <div class="app">
          <div class="sidebar"></div>
          <div class="chat-area">
            <div class="centered">
              <h2>Web Messenger</h2>
              <p>Sign in with Google, create profile and chat.</p>
              <button onclick="signIn()">Sign in with Google</button>
            </div>
          </div>
        </div>
      `;
      return;
    }

    const friends = await fetchFriends();

    const friendsHtml = friends.map(f => `
      <div class="friend-item" onclick="selectFriend('${f.userId}', '${f.chatId}')">
        <div class="friend-avatar">
          ${f.photoURL ? `<img src="${f.photoURL}" style="width:32px;height:32px;border-radius:50%;">` : ""}
        </div>
        <div>
          <div class="friend-name">${f.displayName || f.email}</div>
          <div class="friend-email">${f.email}</div>
        </div>
      </div>
    `).join("");

    const friendName = selectedFriend ? (selectedFriend.displayName || selectedFriend.email) : "No chat selected";

    root.innerHTML = `
      <div class="app">
        <div class="sidebar">
          <div class="sidebar-header">
            <div class="user">
              ${currentUser.photoURL ? `<img src="${currentUser.photoURL}" style="width:28px;height:28px;border-radius:50%;vertical-align:middle;margin-right:6px;">` : ""}
              <span>${currentUser.displayName || currentUser.email}</span>
            </div>
            <button onclick="signOut()">Logout</button>
          </div>
          <div class="friends-header">Your Chats</div>
          <div class="friends-list" id="friendsList">
            ${friendsHtml || `<div style="padding:10px 14px;font-size:13px;color:#8696a0;">No chats yet. Add a friend.</div>`}
          </div>
          <div class="add-friend">
            <input id="addFriendEmail" type="email" placeholder="Friend email to add" />
            <button onclick="addFriendByEmail()">Add friend by email</button>
          </div>
        </div>
        <div class="chat-area">
          <div class="chat-header">
            <div>
              <div class="room-name">${friendName}</div>
              <div class="status">${selectedFriend ? "1 to 1 chat" : "Select a friend"}</div>
            </div>
          </div>
          <div class="messages" id="messages">
            ${selectedFriend ? "" : `<div class="centered">Select a chat or add a friend to start.</div>`}
          </div>
          <div class="input-area">
            <input id="msgInput" type="text" placeholder="Type a message" ${selectedFriend ? "" : "disabled"} />
            <button id="sendBtn" ${selectedFriend ? "" : "disabled"}>Send</button>
          </div>
        </div>
      </div>
    `;

    setupChatInput();
    renderMessages();
  }

  function renderMessages() {
    const messagesDiv = document.getElementById("messages");
    if (!messagesDiv || !selectedFriend) return;
    const msgs = window._cachedMessages || [];
    const html = msgs.map(m => {
      const isMe = m.from === currentUser.uid;
      const time = m.createdAt?.toDate
        ? m.createdAt.toDate().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})
        : "";
      return `
        <div class="msg ${isMe ? "me" : "them"}">
          <div class="text">${(m.text || "").replace(/</g, "&lt;")}</div>
          <div class="meta">${time}</div>
        </div>
      `;
    }).join("");
    messagesDiv.innerHTML = html || `<div class="centered">No messages yet. Say hi!</div>`;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function setupChatInput() {
    const input = document.getElementById("msgInput");
    const btn = document.getElementById("sendBtn");
    if (!input || !btn) return;
    btn.onclick = () => {
      sendMessage(input.value);
      input.value = "";
      input.focus();
    };
    input.onkeydown = (e) => {
      if (e.key === "Enter") {
        sendMessage(input.value);
        input.value = "";
      }
    };
  }

  window.selectFriend = async function(userId, chatId) {
    const snap = await db.collection("users").doc(userId).get();
    if (!snap.exists) return;
    selectedFriend = { id: snap.id, ...snap.data() };
    selectedChatId = chatId;
    subscribeMessages();
    await renderApp();
  };
</script>
</body>
</html>
