<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Messenger - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #c084fc;
      --accent2: #818cf8;
      --accent3: #f472b6;
      --bg: #06060c;
      --card: #0e0e18;
      --surface: #141422;
      --surface2: #1a1a2e;
      --border: #232340;
      --text: #eeeef4;
      --muted: #6b6b88;
    }

    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ===== BACKGROUND ANIMATION ===== */
    .cyber-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .cyber-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(192,132,252,0.015) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(192,132,252,0.015) 60px);
    }

    .bg-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.1;
      animation: blobMove 20s ease-in-out infinite alternate;
    }

    .bg-glow:nth-child(1) {
      width: 500px; height: 500px;
      background: var(--accent);
      top: -20%; left: -20%;
    }
    
    .bg-glow:nth-child(2) {
      width: 400px; height: 400px;
      background: var(--accent2);
      bottom: -10%; right: -15%;
      animation-delay: -10s;
    }

    @keyframes blobMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -40px) scale(1.1); }
    }

    .scan-line {
      position: absolute;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.06;
      animation: scanDown 10s linear infinite;
    }

    @keyframes scanDown {
      0% { top: -1px; }
      100% { top: 100%; }
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    /* ===== LOGIN CARD ===== */
    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      margin: 24px;
      padding: 40px 32px;
      border-radius: 28px;
      background: rgba(14, 14, 24, 0.7);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(192, 132, 252, 0.15);
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
      text-align: center;
      animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes cardEntrance {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== LOGO ===== */
    .brand-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      animation: iconBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
    }

    @keyframes iconBounce {
      from { opacity: 0; transform: scale(0) rotate(-10deg); }
      to { opacity: 1; transform: scale(1) rotate(0); }
    }

    .brand-icon::before {
      content: '';
      position: absolute;
      inset: 2px;
      background: var(--card);
      border-radius: 16px;
    }

    .brand-icon span {
      position: relative;
      z-index: 1;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ===== TEXT ===== */
    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.4px;
      animation: fadeSlideUp 0.6s ease 0.4s both;
    }

    p.subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
      line-height: 1.5;
      animation: fadeSlideUp 0.6s ease 0.5s both;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== BUTTON ===== */
    .login-btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 14px;
      border: none;
      background: #fff;
      color: #333;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      animation: fadeSlideUp 0.6s ease 0.6s both;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.15);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    /* Google Logo Styling */
    .google-icon {
      width: 20px;
      height: 20px;
    }

    .btn-loader {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(0,0,0,0.1);
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .login-btn.loading .btn-text { display: none; }
    .login-btn.loading .google-icon { display: none; }
    .login-btn.loading .btn-loader { display: inline-block; }

    /* ===== FOOTER / STATUS ===== */
    .status-area {
      margin-top: 24px;
      min-height: 1.4em;
      animation: fadeSlideUp 0.6s ease 0.7s both;
    }

    .status-text {
      font-size: 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .status-text.error { color: #f87171; }
    .status-text.success { color: var(--accent4); }

    .meta-footer {
      margin-top: 20px;
      font-size: 11px;
      color: var(--muted);
      animation: fadeSlideUp 0.6s ease 0.8s both;
    }
    
    .meta-footer strong {
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="cyber-bg">
    <div class="bg-glow"></div>
    <div class="bg-glow"></div>
    <div class="scan-line"></div>
  </div>
  <div class="noise"></div>

  <div class="login-card">
    <div class="brand-icon">
      <span>S</span>
    </div>

    <h1>Secure Messenger</h1>
    <p class="subtitle">End-to-end encrypted communication for the modern web.</p>

    <button id="googleSignIn" class="login-btn">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span class="btn-text">Continue with Google</span>
      <div class="btn-loader"></div>
    </button>

    <div class="status-area">
      <div id="status" class="status-text"></div>
    </div>

    <div class="meta-footer">
      Your data is encrypted and never stored on our servers.
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAFKOgNZgaIZ9q09VvmKJrnEWys7ancSEE",
      authDomain: "web-messager-533ae.firebaseapp.com",
      projectId: "web-messager-533ae",
      storageBucket: "web-messager-533ae.firebasestorage.app",
      messagingSenderId: "466370688536",
      appId: "1:466370688536:web:90e63387db2e4b697ff56d",
      measurementId: "G-Q3136YFH7C"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const statusEl = document.getElementById('status');
    const signInBtn = document.getElementById('googleSignIn');

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = 'status-text ' + type;
    }

    async function goToNextPage(user) {
      try {
        const doc = await db.collection('users').doc(user.uid).get();
        localStorage.setItem('userUID', user.uid);
        localStorage.setItem('userEmail', user.email || '');
        localStorage.setItem('userName', user.displayName || '');
        
        if (doc.exists && doc.data().username && doc.data().phone) {
          window.location.href = 'chats.html';
        } else {
          window.location.href = 'setup.html';
        }
      } catch (e) {
        setStatus('Error loading profile: ' + e.message, 'error');
        signInBtn.classList.remove('loading');
      }
    }

    signInBtn.addEventListener('click', async () => {
      try {
        setStatus('Authenticating...', '');
        signInBtn.classList.add('loading');
        
        const provider = new firebase.auth.GoogleAuthProvider();
        const result = await auth.signInWithPopup(provider);
        const user = result.user;
        
        await goToNextPage(user);
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
        signInBtn.classList.remove('loading');
      }
    });

    auth.onAuthStateChanged((user) => {
      if (user) {
        setStatus('Redirecting...', 'success');
        goToNextPage(user);
      }
    });
  </script>
</body>
</html>
