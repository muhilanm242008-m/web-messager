<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Web WhatsApp Mini</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #111b21; color: #e9edef; }

    .app {
      display: flex;
      height: 100vh;
      max-height: 100vh;
    }

    .sidebar {
      width: 30%;
      min-width: 260px;
      background: #202c33;
      border-right: 1px solid #202c33;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #202c33;
    }

    .sidebar-header .user {
      font-size: 14px;
      font-weight: 600;
    }

    .sidebar-header button {
      padding: 6px 10px;
      border-radius: 4px;
      border: none;
      background: #00a884;
      color: #fff;
      cursor: pointer;
      font-size: 12px;
    }

    .chat-list-header {
      padding: 8px 12px;
      font-size: 13px;
      color: #8696a0;
      border-top: 1px solid #111b21;
      border-bottom: 1px solid #111b21;
    }

    .chat-area {
      flex: 1;
      background: #0b141a;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid #202c33;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #202c33;
      font-size: 14px;
    }

    .chat-header .room-name {
      font-weight: 600;
    }

    .chat-header .status {
      font-size: 12px;
      color: #8696a0;
    }

    .messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      background-image: radial-gradient(#202c33 1px, transparent 0);
      background-size: 24px 24px;
      background-color: #0b141a;
    }

    .msg {
      max-width: 70%;
      margin-bottom: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
      position: relative;
      word-wrap: break-word;
    }

    .msg.me {
      margin-left: auto;
      background: #005c4b;
    }

    .msg.them {
      margin-right: auto;
      background: #202c33;
    }

    .msg .meta {
      display: flex;
      justify-content: flex-end;
      font-size: 10px;
      color: #d1d7db;
      margin-top: 2px;
      opacity: 0.8;
    }

    .msg .author {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 2px;
      opacity: 0.9;
    }

    .input-area {
      display: flex;
      padding: 8px 10px;
      gap: 8px;
      border-top: 1px solid #202c33;
      background: #202c33;
    }

    .input-area input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 14px;
      background: #2a3942;
      color: #e9edef;
    }

    .input-area button {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      background: #00a884;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .centered {
      margin: auto;
      text-align: center;
      color: #8696a0;
      font-size: 14px;
    }

    .centered button {
      margin-top: 12px;
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      background: #00a884;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .app { display: block; }
      .chat-area { height: 100vh; }
    }
  </style>
</head>
<body>
<div id="app-root"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-firestore-compat.js"></script>

<script>
  // TODO: replace with your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAFKOgNZgaIZ9q09VvmKJrnEWys7ancSEE",
  authDomain: "web-messager-533ae.firebaseapp.com",
  projectId: "web-messager-533ae",
  storageBucket: "web-messager-533ae.firebasestorage.app",
  messagingSenderId: "466370688536",
  appId: "1:466370688536:web:90e63387db2e4b697ff56d",
  measurementId: "G-Q3136YFH7C"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const root = document.getElementById('app-root');

  let currentUser = null;
  const ROOM_ID = "global-room"; // later you can map this to 1-1 chat IDs

  auth.onAuthStateChanged(user => {
    currentUser = user;
    renderApp();
    if (user) subscribeMessages();
  });

  let unsubscribeMessages = null;
  let cachedMessages = [];

  function subscribeMessages() {
    if (unsubscribeMessages) unsubscribeMessages();

    unsubscribeMessages = db.collection("rooms")
      .doc(ROOM_ID)
      .collection("messages")
      .orderBy("createdAt", "asc")
      .onSnapshot(snapshot => {
        cachedMessages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderApp();
      });
  }

  function signIn() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(console.error);
  }

  function signOut() {
    if (unsubscribeMessages) unsubscribeMessages();
    auth.signOut();
  }

  async function sendMessage(text) {
    if (!currentUser || !text.trim()) return;

    const msg = {
      text: text.trim(),
      uid: currentUser.uid,
      author: currentUser.displayName || "Me",
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    await db.collection("rooms")
      .doc(ROOM_ID)
      .collection("messages")
      .add(msg);
  }

  function renderApp() {
    if (!currentUser) {
      root.innerHTML = `
        <div class="app">
          <div class="sidebar"></div>
          <div class="chat-area">
            <div class="centered">
              <h2>Web WhatsApp Mini</h2>
              <p>Sign in with Google to start chatting.</p>
              <button onclick="signIn()">Sign in with Google</button>
            </div>
          </div>
        </div>
      `;
      return;
    }

    const messagesHtml = cachedMessages.map(m => {
      const isMe = m.uid === currentUser.uid;
      const time = m.createdAt?.toDate
        ? m.createdAt.toDate().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})
        : "";
      return `
        <div class="msg ${isMe ? "me" : "them"}">
          ${!isMe ? `<div class="author">${m.author || "User"}</div>` : ""}
          <div class="text">${(m.text || "").replace(/</g, "&lt;")}</div>
          <div class="meta">${time}</div>
        </div>
      `;
    }).join("");

    root.innerHTML = `
      <div class="app">
        <div class="sidebar">
          <div class="sidebar-header">
            <div class="user">
              ${currentUser.photoURL ? `<img src="${currentUser.photoURL}" style="width:28px;height:28px;border-radius:50%;vertical-align:middle;margin-right:6px;">` : ""}
              <span>${currentUser.displayName || currentUser.email}</span>
            </div>
            <button onclick="signOut()">Logout</button>
          </div>
          <div class="chat-list-header">
            Global room (MVP). 1-1 chats come next.
          </div>
        </div>
        <div class="chat-area">
          <div class="chat-header">
            <div>
              <div class="room-name">Global Chat</div>
              <div class="status">Online</div>
            </div>
          </div>
          <div class="messages" id="messages">
            ${messagesHtml || `<div class="centered">No messages yet. Say hi!</div>`}
          </div>
          <div class="input-area">
            <input id="msgInput" type="text" placeholder="Type a message" />
            <button id="sendBtn">Send</button>
          </div>
        </div>
      </div>
    `;

    const input = document.getElementById("msgInput");
    const btn = document.getElementById("sendBtn");
    const messagesDiv = document.getElementById("messages");

    if (messagesDiv) {
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    if (btn && input) {
      btn.onclick = () => {
        sendMessage(input.value);
        input.value = "";
        input.focus();
      };
      input.onkeydown = (e) => {
        if (e.key === "Enter") {
          sendMessage(input.value);
          input.value = "";
        }
      };
    }
  }

  renderApp();
</script>
</body>
</html>
