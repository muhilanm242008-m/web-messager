<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Messenger - Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111b21;
      color: #e9edef;
      margin: 0;
      overflow: hidden;
    }

    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: #202c33;
      padding: 6px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a3942;
    }
    .back-btn {
      background: none;
      color: #e9edef;
      border: none;
      font-size: 1.4em;
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
    }
    .chat-title {
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .e2ee-status {
      font-size: 10px;
      color: #00a884;
      text-align: center;
      max-width: 200px;
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #2a3942;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e9edef;
      cursor: pointer;
      font-size: 16px;
    }
    .icon-btn:hover { background: #374652; }

    .main-chat {
      position: fixed;
      top: 48px;
      bottom: 64px;
      left: 0;
      right: 0;
      max-width: 900px;
      margin: 0 auto;
      background: #0b141a;
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px;
      -webkit-overflow-scrolling: touch;
    }
    .message {
      margin-bottom: 12px;
      display: flex;
      max-width: 100%;
    }
    .message.me { justify-content: flex-end; }
    .message.friend { justify-content: flex-start; }
    .message-bubble {
      max-width: 100%;
      padding: 6px 10px;
      border-radius: 7.5px;
      word-wrap: break-word;
      box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
      font-size: 14px;
      white-space: normal;
      word-break: break-word;
    }
    .message.me .message-bubble {
      background: #005c4b;
      color: white;
      border-bottom-right-radius: 0;
    }
    .message.friend .message-bubble {
      background: #202c33;
      color: #e9edef;
      border-bottom-left-radius: 0;
    }
    .message-time {
      font-size: 10px;
      color: #667781;
      margin-top: 2px;
    }
    .message.me .message-time { text-align: right; }
    .message.friend .message-time { text-align: left; }

    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 8px 10px;
      background: #202c33;
      border-top: 1px solid #2a3942;
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .input {
      flex: 1;
      padding: 9px 12px;
      background: #2a3942;
      border: none;
      border-radius: 18px;
      color: white;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      min-height: 40px;
      line-height: 18px;
    }
    .input::placeholder { color: #8696a0; }
    .input:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(0,168,132,0.3);
    }
    .send-btn {
      width: 40px;
      height: 40px;
      background: #00a884;
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .send-btn:disabled {
      background: #404c55;
      cursor: not-allowed;
    }

    .no-chat {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #8696a0;
      font-size: 14px;
      text-align: center;
      gap: 6px;
    }
    .loading { color: #00a884; }

    .media-img {
      max-width: 220px;
      border-radius: 10px;
      display: block;
    }
    .media-video {
      max-width: 220px;
      border-radius: 10px;
      display: block;
      background: #000;
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      z-index: 200;
    }
    .video-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      color: #e9edef;
      font-size: 14px;
    }
    .video-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #000;
    }
    video { background: #000; }
    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    #localVideo {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 120px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.7);
      box-shadow: 0 6px 18px rgba(0,0,0,0.6);
    }
    .video-controls {
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    .video-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #fff;
    }
    .video-btn.end { background: #ff4b4b; }
    .video-btn.reg { background: #2a3942; }

    .video-call-link {
      color: #c1d7ff;
      text-decoration: underline;
      cursor: pointer;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="top-nav">
    <button class="back-btn" onclick="handleBack()">←</button>
    <div class="chat-header">
      <div class="chat-title" id="chatTitle">Loading chat...</div>
      <div class="e2ee-status">🔒 Messages & video are end-to-end encrypted</div>
    </div>
    <div class="nav-actions">
      <button class="icon-btn" id="videoBtn" title="Video call">📹</button>
    </div>
  </div>

  <div class="main-chat">
    <div class="messages" id="messages">
      <div class="no-chat">
        <div style="font-size: 36px;">💬</div>
        <div>Messages will appear here</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <button class="icon-btn" id="attachBtn" title="Attach photo/video">📎</button>
    <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none;">
    <textarea id="messageInput" class="input" placeholder="Type a secure message" disabled></textarea>
    <button id="sendBtn" class="send-btn" disabled>➤</button>
  </div>

  <!-- Video call overlay -->
  <div class="video-overlay" id="videoOverlay">
    <div class="video-top">
      <span id="callLabel">Video call</span>
      <span id="callStatus">Connecting...</span>
    </div>
    <div class="video-main">
      <video id="remoteVideo" autoplay playsinline></video>
      <video id="localVideo" autoplay playsinline muted></video>
    </div>
    <div class="video-controls">
      <button class="video-btn reg" id="toggleMicBtn">🎙️</button>
      <button class="video-btn reg" id="toggleCamBtn">📷</button>
      <button class="video-btn end" id="hangupBtn">✖</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAFKOgNZgaIZ9q09VvmKJrnEWys7ancSEE",
      authDomain: "web-messager-533ae.firebaseapp.com",
      projectId: "web-messager-533ae",
      storageBucket: "web-messager-533ae.firebasestorage.app",
      messagingSenderId: "466370688536",
      appId: "1:466370688536:web:90e63387db2e4b697ff56d",
      measurementId: "G-Q3136YFH7C"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    let userUID = null;
    let selectedFriend = null;
    let chatKey = null;
    let chatId = null;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const mediaInput = document.getElementById('mediaInput');
    const attachBtn = document.getElementById('attachBtn');

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // ------- E2EE helpers -------
    async function getChatKey(uid1, uid2) {
      const combined = [uid1, uid2].sort().join(':');
      const encoder = new TextEncoder();
      const keyData = encoder.encode(combined);
      const hashBuffer = await window.crypto.subtle.digest('SHA-256', keyData);
      const key = await window.crypto.subtle.importKey(
        'raw', hashBuffer, {name: 'AES-GCM'}, false, ['encrypt', 'decrypt']
      );
      return key;
    }

    async function encrypt(text, key) {
      const encoder = new TextEncoder();
      const iv = window.crypto.getRandomValues(new Uint8Array(12));
      const data = encoder.encode(text);
      const encrypted = await window.crypto.subtle.encrypt(
        { name: 'AES-GCM', iv }, key, data
      );
      return JSON.stringify({
        iv: Array.from(iv),
        data: Array.from(new Uint8Array(encrypted))
      });
    }

    async function decrypt(encryptedStr, key) {
      try {
        const ciphertext = JSON.parse(encryptedStr);
        const decoder = new TextDecoder();
        const iv = new Uint8Array(ciphertext.iv);
        const encryptedData = new Uint8Array(ciphertext.data);
        const decrypted = await window.crypto.subtle.decrypt(
          { name: 'AES-GCM', iv }, key, encryptedData
        );
        return decoder.decode(decrypted);
      } catch {
        return '[🔒 Unable to decrypt]';
      }
    }

    async function ensureChatDoc() {
      const chatRef = db.collection('chats').doc(chatId);
      const doc = await chatRef.get();
      const baseData = {
        participants: [userUID, selectedFriend.id],
        otherName: selectedFriend.name || selectedFriend.username || selectedFriend.phone || '',
        otherUsername: selectedFriend.username || '',
        otherPhone: selectedFriend.phone || '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      if (!doc.exists) {
        await chatRef.set(baseData, { merge: true });
      } else if (!doc.data().participants) {
        await chatRef.set({ participants: [userUID, selectedFriend.id] }, { merge: true });
      } else {
        await chatRef.set(baseData, { merge: true });
      }
    }

    function scrollMessagesToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ------- lastSeen helper (for unread badges) -------
    async function updateLastSeen() {
      if (!chatId || !userUID) return;
      try {
        await db.collection('chats').doc(chatId).set({
          lastSeen: {
            [userUID]: firebase.firestore.FieldValue.serverTimestamp()
          }
        }, { merge: true });
      } catch (e) {
        console.error('updateLastSeen error:', e);
      }
    }

    // ------- Load all messages -------
    function loadMessages() {
      db.collection('chats').doc(chatId).collection('messages')
        .orderBy('createdAt', 'asc')
        .onSnapshot(async (snapshot) => {
          messagesEl.innerHTML = '';
          if (snapshot.empty) {
            messagesEl.innerHTML = `
              <div class="no-chat">
                <div style="font-size:32px;">🔒</div>
                <div>Start the conversation!</div>
              </div>`;
            return;
          }
          const now = Date.now();
          for (let doc of snapshot.docs) {
            const msg = doc.data();
            const isMedia = !!msg.mediaUrl;
            let displayText = msg.text;

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (msg.senderId === userUID ? 'me' : 'friend');

            let contentHtml = '';

            // Video call invite message
            if (!isMedia && msg.videoRoomId) {
              const roomId = msg.videoRoomId;
              const expiresAt = msg.expiresAt || 0;
              const expired = expiresAt && now > expiresAt;

              if (expired) {
                // Hide expired video call invites
                continue;
              } else {
                contentHtml = `<span class="video-call-link" data-room="${roomId}">
                  Join video call (expires in 10 min)
                </span>`;
              }
            } else {
              // Normal text/media
              if (msg.encrypted && chatKey && !isMedia && msg.text) {
                displayText = await decrypt(msg.text, chatKey);
              }

              if (isMedia) {
                if (msg.mediaType === 'image') {
                  contentHtml = `<img src="${msg.mediaUrl}" class="media-img" alt="photo">`;
                } else if (msg.mediaType === 'video') {
                  contentHtml = `<video src="${msg.mediaUrl}" controls class="media-video"></video>`;
                } else {
                  contentHtml = `<a href="${msg.mediaUrl}" target="_blank" style="color:#c1d7ff;">Download file</a>`;
                }
              } else if (displayText) {
                contentHtml = escapeHtml(displayText);
              }
            }

            const timeStr = msg.createdAt
              ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], {
                  hour: '2-digit',
                  minute: '2-digit'
                })
              : 'Pending';

            msgDiv.innerHTML = `
              <div>
                <div class="message-bubble">${contentHtml}</div>
                <div class="message-time">${timeStr}</div>
              </div>
            `;
            messagesEl.appendChild(msgDiv);
          }

          // attach click for video call links
          messagesEl.querySelectorAll('.video-call-link').forEach(el => {
            el.onclick = () => {
              const roomId = el.getAttribute('data-room');
              if (roomId) {
                joinCallRoom(roomId, false);
              }
            };
          });

          scrollMessagesToBottom();
        }, (error) => {
          console.error('Messages error:', error);
          messagesEl.innerHTML =
            '<div class="no-chat">❌ Error loading messages</div>';
        });
    }

    // ------- Init chat -------
    async function initChat() {
      try {
        messagesEl.innerHTML =
          '<div class="no-chat loading">Connecting to secure chat...</div>';
        chatId = [userUID, selectedFriend.id].sort().join('_');
        chatKey = await getChatKey(userUID, selectedFriend.id);
        await ensureChatDoc();

        // Important: mark current messages as seen when opening
        await updateLastSeen();

        inputEl.disabled = false;
        sendBtn.disabled = false;

        inputEl.addEventListener('input', function() {
          this.style.height = 'auto';
          this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        inputEl.addEventListener('focus', () => {
          setTimeout(scrollMessagesToBottom, 200);
        });

        loadMessages();
      } catch (e) {
        console.error('Chat init error:', e);
        messagesEl.innerHTML =
          '<div class="no-chat">❌ Chat connection failed</div>';
      }
    }

    async function handleBack() {
      await updateLastSeen();  // ensure latest messages marked as seen
      window.location.href = 'chats.html';
    }

    // ------- Send text message -------
    sendBtn.onclick = async function() {
      let text = inputEl.value;
      text = text.replace(/\s*\n\s*/g, ' ').trim();
      if (!text || !chatKey) return;
      this.disabled = true;
      try {
        const encryptedText = await encrypt(text, chatKey);
        const msgRef = db.collection('chats').doc(chatId).collection('messages');
        await msgRef.add({
          senderId: userUID,
          text: encryptedText,
          encrypted: true,
          mediaUrl: null,
          mediaType: null,
          videoRoomId: null,
          expiresAt: null,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        await db.collection('chats').doc(chatId).set({
          lastMessageText: text,
          lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
          lastSenderId: userUID
        }, { merge: true });

        inputEl.value = '';
        inputEl.style.height = '40px';
        scrollMessagesToBottom();
      } catch (e) {
        console.error('Send text error:', e);
        alert('Failed to send message');
      } finally {
        this.disabled = false;
      }
    };

    inputEl.onkeypress = function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    };

    // ------- Send media -------
    attachBtn.onclick = () => {
      if (!chatId) {
        console.warn('No chatId yet, cannot attach');
        return;
      }
      mediaInput.click();
    };

    mediaInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file || !chatId) return;

      try {
        if (file.size > 20 * 1024 * 1024) {
          alert('File is too large (max 20MB).');
          mediaInput.value = '';
          return;
        }

        const fileName = Date.now() + '_' + file.name;
        const ref = storage.ref().child(`chatMedia/${chatId}/${fileName}`);
        const snapshot = await ref.put(file);
        const url = await snapshot.ref.getDownloadURL();

        const isImage = file.type.startsWith('image/');
        const isVideo = file.type.startsWith('video/');

        const msgRef = db.collection('chats').doc(chatId).collection('messages');
        await msgRef.add({
          senderId: userUID,
          text: '',
          encrypted: false,
          mediaUrl: url,
          mediaType: isImage ? 'image' : (isVideo ? 'video' : 'file'),
          videoRoomId: null,
          expiresAt: null,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        await db.collection('chats').doc(chatId).set({
          lastMessageText: isImage ? '[Photo]' : (isVideo ? '[Video]' : '[File]'),
          lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
          lastSenderId: userUID
        }, { merge: true });

        mediaInput.value = '';
        scrollMessagesToBottom();
      } catch (err) {
        console.error('Upload media error:', err);
        alert('Failed to send media: ' + err.message);
      }
    };

    // ---------- VIDEO CALL via INVITE LINK with EXPIRY ----------

    const videoBtn = document.getElementById('videoBtn');
    const videoOverlay = document.getElementById('videoOverlay');
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const callLabel = document.getElementById('callLabel');
    const callStatus = document.getElementById('callStatus');
    const toggleMicBtn = document.getElementById('toggleMicBtn');
    const toggleCamBtn = document.getElementById('toggleCamBtn');
    const hangupBtn = document.getElementById('hangupBtn');

    let pc = null;
    let localStream = null;
    let remoteStream = null;
    let roomRef = null;
    let caller = false;
    let micEnabled = true;
    let camEnabled = true;

    const rtcConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' }
      ]
    };

    async function startLocalMedia() {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      localVideo.srcObject = localStream;
      remoteStream = new MediaStream();
      remoteVideo.srcObject = remoteStream;
    }

    async function createPeerConnection() {
      pc = new RTCPeerConnection(rtcConfig);

      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      pc.ontrack = (event) => {
        event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
      };

      pc.onicecandidate = async (event) => {
        if (!event.candidate || !roomRef) return;
        const candidatesCol = roomRef.collection(caller ? 'callerCandidates' : 'calleeCandidates');
        await candidatesCol.add(event.candidate.toJSON());
      };
    }

    async function createRoomAndSendLink() {
      const roomId = chatId + '_' + Date.now();
      roomRef = db.collection('rooms').doc(roomId);
      await roomRef.set({
        chatId,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        createdBy: userUID
      });

      const expiresAt = Date.now() + 10 * 60 * 1000; // 10 minutes

      const msgRef = db.collection('chats').doc(chatId).collection('messages');
      await msgRef.add({
        senderId: userUID,
        text: '',
        encrypted: false,
        mediaUrl: null,
        mediaType: null,
        videoRoomId: roomId,
        expiresAt,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      await db.collection('chats').doc(chatId).set({
        lastMessageText: '[Video call link]',
        lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
        lastSenderId: userUID
      }, { merge: true });

      await joinCallRoom(roomId, true);
    }

    async function joinCallRoom(roomId, isCaller = false) {
      try {
        videoOverlay.style.display = 'flex';
        callLabel.textContent =
          'Video call with ' +
          (selectedFriend.name || selectedFriend.username || selectedFriend.phone || '');
        callStatus.textContent = 'Connecting...';

        await startLocalMedia();
        await createPeerConnection();

        caller = isCaller;
        roomRef = db.collection('rooms').doc(roomId);

        const roomSnapshot = await roomRef.get();
        if (!roomSnapshot.exists && isCaller) {
          await roomRef.set({
            chatId,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            createdBy: userUID
          }, { merge: true });
        }

        if (isCaller) {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          await roomRef.set({
            chatId,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            createdBy: userUID,
            offer: {
              type: offer.type,
              sdp: offer.sdp
            }
          }, { merge: true });

          roomRef.onSnapshot(async (snapshot) => {
            const data = snapshot.data();
            if (!pc.currentRemoteDescription && data && data.answer) {
              const answerDesc = new RTCSessionDescription(data.answer);
              await pc.setRemoteDescription(answerDesc);
              callStatus.textContent = 'Connected';
            }
          });

        } else {
          const snap = await roomRef.get();
          if (!snap.exists || !snap.data().offer) {
            alert('Call not ready yet. Ask your friend to create link again.');
            endCall();
            return;
          }
          const offer = snap.data().offer;
          await pc.setRemoteDescription(new RTCSessionDescription(offer));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          await roomRef.set({
            answer: {
              type: answer.type,
              sdp: answer.sdp
            }
          }, { merge: true });

          roomRef.onSnapshot(s => {
            const d = s.data();
            if (d && d.answer) {
              callStatus.textContent = 'Connected';
            }
          });
        }

        const otherCandidatesCol = roomRef.collection(isCaller ? 'calleeCandidates' : 'callerCandidates');
        otherCandidatesCol.onSnapshot(snapshot => {
          snapshot.docChanges().forEach(change => {
            if (change.type === 'added') {
              const candidate = new RTCIceCandidate(change.doc.data());
              pc.addIceCandidate(candidate);
            }
          });
        });

      } catch (e) {
        console.error('Join call room error:', e);
        alert('Unable to start/join video call.');
        endCall();
      }
    }

    async function endCall() {
      videoOverlay.style.display = 'none';
      callStatus.textContent = 'Disconnected';

      if (pc) {
        pc.getSenders().forEach(sender => sender.track && sender.track.stop());
        pc.close();
        pc = null;
      }
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      if (remoteStream) {
        remoteStream.getTracks().forEach(t => t.stop());
        remoteStream = null;
      }

      if (roomRef && caller) {
        const calleeCandidates = await roomRef.collection('calleeCandidates').get();
        calleeCandidates.forEach(doc => doc.ref.delete());
        const callerCandidates = await roomRef.collection('callerCandidates').get();
        callerCandidates.forEach(doc => doc.ref.delete());
        await roomRef.delete();
      }
      roomRef = null;
      caller = false;
      micEnabled = true;
      camEnabled = true;
    }

    videoBtn.onclick = () => {
      if (!chatId) return;
      createRoomAndSendLink();
    };

    hangupBtn.onclick = () => {
      endCall();
    };

    toggleMicBtn.onclick = () => {
      if (!localStream) return;
      micEnabled = !micEnabled;
      localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
      toggleMicBtn.textContent = micEnabled ? '🎙️' : '🔇';
    };

    toggleCamBtn.onclick = () => {
      if (!localStream) return;
      camEnabled = !camEnabled;
      localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
      toggleCamBtn.textContent = camEnabled ? '📷' : '🚫';
    };

    // When user leaves the tab, mark messages as seen
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        updateLastSeen();
      }
    });

    // ------- Auth + load selected friend -------
    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      userUID = user.uid;
      const friendStr = localStorage.getItem('selectedFriend');
      if (!friendStr) {
        window.location.href = 'chats.html';
        return;
      }
      selectedFriend = JSON.parse(friendStr);
      const title =
        selectedFriend.name || selectedFriend.username || selectedFriend.phone || 'Chat';
      document.getElementById('chatTitle').textContent = title;
      initChat();
    });
  </script>
</body>
</html>
