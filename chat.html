<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Messenger - Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    :root {
      --accent: #c084fc;
      --accent2: #818cf8;
      --accent3: #f472b6;
      --accent4: #34d399;
      --bg: #06060c;
      --card: #0e0e18;
      --surface: #141422;
      --surface2: #1a1a2e;
      --border: #232340;
      --border2: #2d2d4a;
      --text: #eeeef4;
      --muted: #6b6b88;
      --my-bubble: #2d1b4e;
      --their-bubble: #141422;
      --danger: #f87171;
      --warning: #fbbf24;
    }

    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ===== BACKGROUND ===== */
    .chat-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .chat-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(192,132,252,0.015) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(192,132,252,0.015) 60px);
    }

    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.08;
    }

    .bg-blob:nth-child(1) {
      width: 400px; height: 400px;
      background: var(--accent);
      top: -10%; left: -15%;
      animation: blobMove 20s ease-in-out infinite alternate;
    }

    .bg-blob:nth-child(2) {
      width: 300px; height: 300px;
      background: var(--accent2);
      bottom: -5%; right: -10%;
      animation: blobMove 25s ease-in-out infinite alternate-reverse;
    }

    @keyframes blobMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -30px) scale(1.1); }
    }

    /* ===== TOP NAV ===== */
    .top-nav {
      position: relative;
      z-index: 50;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(6, 6, 12, 0.85);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: var(--surface2);
      border-color: var(--border2);
      transform: translateX(-2px);
    }

    .friend-avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: var(--bg);
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }

    .friend-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .friend-avatar .status-dot {
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--muted);
      border: 2px solid var(--card);
      transition: background 0.3s ease;
    }

    .friend-avatar .status-dot.online {
      background: var(--accent4);
      box-shadow: 0 0 6px rgba(52, 211, 153, 0.5);
    }

    .chat-header-info {
      flex: 1;
      min-width: 0;
    }

    .chat-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .presence-status {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 1px;
      transition: color 0.3s ease;
    }

    .presence-status.online { color: var(--accent4); }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .nav-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      background: var(--surface2);
      color: var(--text);
      border-color: rgba(192, 132, 252, 0.3);
      transform: translateY(-2px);
    }

    /* ===== MESSAGES AREA ===== */
    .messages-wrapper {
      flex: 1;
      position: relative;
      z-index: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px;
    }

    /* ===== EMPTY / LOADING STATES ===== */
    .state-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 10px;
      text-align: center;
      padding: 40px 20px;
    }

    .state-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      animation: iconFloat 3s ease-in-out infinite;
    }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .state-title {
      font-size: 16px;
      font-weight: 600;
    }

    .state-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .loading-ring {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== DATE SEPARATOR ===== */
    .date-separator {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }

    .date-separator .line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .date-separator span {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      padding: 3px 10px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    /* ===== MESSAGE ROWS ===== */
    .message {
      display: flex;
      max-width: 100%;
      animation: msgAppear 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes msgAppear {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message.me { justify-content: flex-end; }
    .message.friend { justify-content: flex-start; }

    .msg-group {
      max-width: 78%;
      display: flex;
      flex-direction: column;
    }

    .message.me .msg-group { align-items: flex-end; }
    .message.friend .msg-group { align-items: flex-start; }

    /* ===== BUBBLE ===== */
    .message-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.5;
      position: relative;
      max-width: 100%;
      transition: transform 0.15s ease;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
    }

    .message-bubble:active {
      transform: scale(0.98);
    }

    .message.me .message-bubble {
      background: linear-gradient(135deg, #3b1a6e, #2d1b4e);
      color: #e8d5ff;
      border-bottom-right-radius: 6px;
      border: 1px solid rgba(192, 132, 252, 0.2);
      box-shadow: 0 4px 20px rgba(192, 132, 252, 0.1);
    }

    .message.friend .message-bubble {
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 6px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    /* ===== MESSAGE META ===== */
    .msg-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 3px;
      padding: 0 2px;
    }

    .message.me .msg-meta { justify-content: flex-end; }
    .message.friend .msg-meta { justify-content: flex-start; }

    .msg-time {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .edited-tag {
      font-size: 10px;
      color: var(--muted);
      font-style: italic;
    }

    /* ===== REACTIONS ===== */
    .reactions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }

    .reaction-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      border-radius: 10px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .reaction-chip:hover {
      background: rgba(192, 132, 252, 0.1);
      border-color: rgba(192, 132, 252, 0.3);
    }

    /* ===== MEDIA ===== */
    .media-img {
      max-width: 240px;
      max-height: 300px;
      border-radius: 12px;
      display: block;
      object-fit: cover;
      cursor: zoom-in;
      transition: transform 0.2s ease;
    }

    .media-img:hover { transform: scale(1.02); }

    .media-video {
      max-width: 240px;
      border-radius: 12px;
      display: block;
      background: #000;
    }

    /* ===== CALL LINK ===== */
    .call-link-bubble {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .call-link-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .call-link-info .label {
      font-size: 14px;
      font-weight: 600;
    }

    .call-link-info .hint {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .call-link-bubble:hover {
      background: rgba(192, 132, 252, 0.1);
    }

    /* ===== SCROLL TO BOTTOM ===== */
    .scroll-to-bottom {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      z-index: 10;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .scroll-to-bottom:hover {
      background: var(--accent);
      color: var(--bg);
      transform: translateY(-2px);
    }

    .scroll-to-bottom.show { display: flex; }

    /* ===== INPUT AREA ===== */
    .input-area {
      position: relative;
      z-index: 10;
      padding: 10px 12px;
      background: rgba(6, 6, 12, 0.9);
      backdrop-filter: blur(30px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    .attach-btn {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: all 0.2s ease;
      align-self: flex-end;
    }

    .attach-btn:hover {
      background: var(--surface2);
      color: var(--accent);
      border-color: rgba(192, 132, 252, 0.3);
    }

    .input-shell {
      flex: 1;
      position: relative;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 16px;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .input-shell:focus-within {
      border-color: rgba(192, 132, 252, 0.4);
      box-shadow: 0 0 0 4px rgba(192, 132, 252, 0.06);
    }

    .msg-input {
      width: 100%;
      padding: 11px 14px;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      min-height: 42px;
      line-height: 20px;
      outline: none;
      display: block;
    }

    .msg-input::placeholder { color: #3d3d5a; }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      align-self: flex-end;
      position: relative;
      overflow: hidden;
    }

    .send-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .send-btn:hover:not(:disabled)::before { opacity: 1; }

    .send-btn:hover:not(:disabled) {
      transform: scale(1.08) translateY(-2px);
      box-shadow: 0 6px 20px rgba(192, 132, 252, 0.4);
    }

    .send-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      background: var(--surface2);
      cursor: not-allowed;
      transform: none;
    }

    .send-btn span {
      position: relative;
      z-index: 1;
    }

    /* ===== CALL OVERLAY ===== */
    .call-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: none;
      flex-direction: column;
      z-index: 200;
    }

    .call-overlay.active { display: flex; }

    .call-top {
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(6, 6, 12, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .call-top-left { display: flex; flex-direction: column; gap: 2px; }

    .call-top-name {
      font-size: 15px;
      font-weight: 600;
    }

    .call-top-status {
      font-size: 12px;
      color: var(--accent4);
      font-family: 'JetBrains Mono', monospace;
    }

    .call-top-type {
      font-size: 11px;
      color: var(--muted);
    }

    .call-main {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #02020a;
      overflow: hidden;
    }

    .call-main::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(192,132,252,0.05) 0%, transparent 70%);
    }

    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #localVideo {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 110px;
      height: 80px;
      object-fit: cover;
      border-radius: 14px;
      border: 2px solid rgba(192, 132, 252, 0.4);
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      transition: all 0.3s ease;
    }

    #localVideo:hover {
      width: 160px;
      height: 120px;
    }

    .call-info-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
    }

    .call-avatar-lg {
      width: 100px;
      height: 100px;
      border-radius: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 700;
      color: var(--bg);
      margin: 0 auto 14px;
      animation: avatarPulse 2s ease-in-out infinite;
      overflow: hidden;
    }

    .call-avatar-lg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes avatarPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(192, 132, 252, 0.3); }
      50% { box-shadow: 0 0 0 20px rgba(192, 132, 252, 0); }
    }

    .call-info-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .call-info-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .call-controls {
      padding: 18px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      background: rgba(6, 6, 12, 0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
    }

    .call-btn {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .call-btn:hover {
      transform: scale(1.1) translateY(-3px);
    }

    .call-btn:active { transform: scale(0.95); }

    .call-btn.ctrl {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .call-btn.ctrl.muted {
      background: rgba(248, 113, 113, 0.15);
      border-color: rgba(248, 113, 113, 0.3);
      color: var(--danger);
    }

    .call-btn.end-call {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      width: 64px;
      height: 64px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3);
    }

    .call-btn.end-call:hover {
      box-shadow: 0 12px 35px rgba(239, 68, 68, 0.5);
    }

    /* ===== CONTEXT MENU ===== */
    .ctx-menu {
      display: none;
      position: fixed;
      z-index: 300;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      padding: 6px;
      min-width: 160px;
      animation: ctxIn 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes ctxIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }

    .ctx-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-weight: 500;
    }

    .ctx-item:hover {
      background: rgba(192, 132, 252, 0.1);
      color: var(--accent);
    }

    .ctx-item.danger:hover {
      background: rgba(248, 113, 113, 0.1);
      color: var(--danger);
    }

    .ctx-item .ctx-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    /* ===== EMOJI PICKER ===== */
    .emoji-picker {
      display: none;
      position: fixed;
      z-index: 301;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      animation: ctxIn 0.2s ease;
    }

    .emoji-picker .emoji-row {
      display: flex;
      gap: 4px;
    }

    .emoji-opt {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .emoji-opt:hover {
      background: rgba(192, 132, 252, 0.15);
      transform: scale(1.2);
    }

    /* ===== IMAGE VIEWER ===== */
    .img-viewer {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(0,0,0,0.95);
      display: none;
      align-items: center;
      justify-content: center;

      from { opacity: 0; }
      to { opacity: 1; }
    }

    .img-viewer img {
      max-width: 95vw;
      max-height: 90vh;
      border-radius: 16px;
      object-fit: contain;
      animation: imgZoomIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);

      top: 16px;
      right: 16px;

      height: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);

      font-size: 18px;
      cursor: pointer;
      display: flex;

      justify-content: center;
      transition: all 0.2s ease;
    }

    .img-viewer-close:hover {
      background: rgba(255,255,255,0.2);
    }

    /* ===== TYPING INDICATOR ===== */
    .typing-indicator {
      display: none;
      padding: 4px 14px;
      flex-shrink: 0;

    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: typingBounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* ===== UPLOAD PROGRESS ===== */

    .upload-toast.show {

    .upload-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;

    /* ===== RESPONSIVE ===== */

      .top-nav { padding: 8px 10px; }
      .msg-group { max-width: 88%; }
      .media-img, .media-video { max-width: 200px; }
    }
  </style>

  <script>
  const firebaseConfig = {
      apiKey: "AIzaSyAFKOgNZgaIZ9q09VvmKJrnEWys7ancSEE",
      authDomain: "web-messager-533ae.firebaseapp.com",

      appId: "1:466370688536:web:90e63387db2e4b697ff56d",
      measurementId: "G-Q3136YFH7C"

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    let userUID = null;

    const messagesEl = document.getElementById('messages');

    function escapeHtml(t) {
      const m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return t.replace(/[&<>"']/g, c => m[c]);
    }

    // ===== PRESENCE =====
    async function setUserPresence(online) {
      if (!userUID) return;
      try {
        await db.collection('users').doc(userUID).set({
          online,
          lastActive: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      } catch (e) { console.error('Presence error:', e); }
    }

    function formatLastActive(ts) {
      if (!ts) return '';
      const d = ts.toDate();
      const diffMin = Math.floor((Date.now() - d.getTime()) / 60000);
      const diffHours = Math.floor(diffMin / 60);
      const diffDays = Math.floor(diffHours / 24);
      if (diffMin < 1) return 'just now';
      if (diffMin < 60) return `${diffMin}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      return 'long time ago';
    }

    function watchFriendPresence(friendUid) {
      db.collection('users').doc(friendUid).onSnapshot(doc => {
        if (!doc.exists) return;
        const data = doc.data();
        if (data.online) {
          presenceStatusEl.textContent = 'online';
          presenceStatusEl.className = 'presence-status online';
          statusDotEl.className = 'status-dot online';
        } else {
          const lastSeen = data.lastActive ? 'last seen ' + formatLastActive(data.lastActive) : 'offline';
          presenceStatusEl.textContent = lastSeen;
          presenceStatusEl.className = 'presence-status';
          statusDotEl.className = 'status-dot';
        }
      }, () => {
        presenceStatusEl.textContent = '🔒 end-to-end encrypted';
        presenceStatusEl.className = 'presence-status';
      });
    }

    // ===== E2EE =====
    async function getChatKey(uid1, uid2) {
      const combined = [uid1, uid2].sort().join(':');
      const keyData = new TextEncoder().encode(combined);
      const hashBuffer = await crypto.subtle.digest('SHA-256', keyData);
      return crypto.subtle.importKey('raw', hashBuffer, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
    }

    async function encrypt(text, key) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const data = new TextEncoder().encode(text);
      const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data);
      return JSON.stringify({ iv: Array.from(iv), data: Array.from(new Uint8Array(encrypted)) });
    }

    async function decrypt(encStr, key) {
      try {
        const c = JSON.parse(encStr);
        const decrypted = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv: new Uint8Array(c.iv) }, key, new Uint8Array(c.data)
        );
        return new TextDecoder().decode(decrypted);
      } catch { return '[🔒 Unable to decrypt]'; }
    }

    // ===== CHAT INIT =====
    async function ensureChatDoc() {
      await db.collection('chats').doc(chatId).set({
        participants: [userUID, selectedFriend.id],
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    }

    async function updateLastSeen() {
      if (!chatId || !userUID) return;
      try {
        await db.collection('chats').doc(chatId).set({
          lastSeen: { [userUID]: firebase.firestore.FieldValue.serverTimestamp() }
        }, { merge: true });
      } catch (e) { console.error('updateLastSeen:', e); }
    }

    function scrollToBottom(smooth = true) {
      messagesEl.scrollTo({
        top: messagesEl.scrollHeight,
        behavior: smooth ? 'smooth' : 'auto'
      });
    }

    // Scroll button visibility
    messagesEl.addEventListener('scroll', () => {
      const threshold = 200;
      const distFromBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight;
      scrollBtn.classList.toggle('show', distFromBottom > threshold);
    });

    scrollBtn.onclick = () => scrollToBottom(true);

    function formatDateLabel(d) {
      const today = new Date();
      const y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
      const ty = today.getFullYear(), tm = today.getMonth(), td = today.getDate();
      if (y === ty && m === tm && day === td) return 'Today';
      if (y === ty && m === tm && day === td - 1) return 'Yesterday';
      return d.toLocaleDateString([], { day: '2-digit', month: 'short', year: 'numeric' });
    }

    // ===== LOAD MESSAGES =====
    function loadMessages() {
      db.collection('chats').doc(chatId).collection('messages')
        .orderBy('createdAt', 'asc')
        .onSnapshot(async snapshot => {
          messagesEl.innerHTML = '';

          if (snapshot.empty) {
            messagesEl.innerHTML = `
              <div class="state-center">
                <div class="state-icon">🔐</div>
                <div class="state-title">Start the conversation</div>
                <div class="state-sub">Messages are end-to-end encrypted</div>
              </div>`;
            return;
          }

          const now = Date.now();
          let lastDateKey = null;
          const wasAtBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 100;

          for (const doc of snapshot.docs) {
            const msg = doc.data();
            const isMedia = !!msg.mediaUrl;
            const isMine = msg.senderId === userUID;

            // Date separator
            const createdAt = msg.createdAt ? msg.createdAt.toDate() : null;
            if (createdAt) {
              const dk = createdAt.toDateString();
              if (dk !== lastDateKey) {
                lastDateKey = dk;
                const sep = document.createElement('div');
                sep.className = 'date-separator';
                sep.innerHTML = `<div class="line"></div><span>${formatDateLabel(createdAt)}</span><div class="line"></div>`;
                messagesEl.appendChild(sep);
              }
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (isMine ? 'me' : 'friend');

            let contentHtml = '';

            // Call link
            if (!isMedia && msg.videoRoomId) {
              const expired = msg.expiresAt && now > msg.expiresAt;
              if (expired) continue;
              const isAudio = msg.callType === 'audio';
              contentHtml = `
                <div class="call-link-bubble" data-room="${msg.videoRoomId}" data-type="${isAudio ? 'audio' : 'video'}">
                  <div class="call-link-icon">${isAudio ? '📞' : '📹'}</div>
                  <div class="call-link-info">
                    <div class="label">${isAudio ? 'Voice' : 'Video'} Call</div>
                    <div class="hint">Tap to join · expires in 10 min</div>
                  </div>
                </div>`;
            } else if (isMedia) {
              if (msg.mediaType === 'image') {
                contentHtml = `<img src="${msg.mediaUrl}" class="media-img" alt="Photo" onclick="openImgViewer('${msg.mediaUrl}')">`;
              } else if (msg.mediaType === 'video') {
                contentHtml = `<video src="${msg.mediaUrl}" controls class="media-video" playsinline></video>`;
              } else {
                contentHtml = `<a href="${msg.mediaUrl}" target="_blank" style="color:var(--accent);">📁 Download file</a>`;
              }
            } else {
              let displayText = msg.text;
              if (msg.encrypted && chatKey && msg.text) {
                displayText = await decrypt(msg.text, chatKey);
              }
              contentHtml = escapeHtml(displayText || '');
            }

            // Reactions
            let reactionsHtml = '';
            if (msg.reactions && Object.keys(msg.reactions).length > 0) {
              const counts = {};
              Object.values(msg.reactions).forEach(e => counts[e] = (counts[e] || 0) + 1);
              reactionsHtml = `<div class="reactions-row">
                ${Object.entries(counts).map(([emoji, count]) =>
                  `<span class="reaction-chip">${emoji}${count > 1 ? ` <small>${count}</small>` : ''}</span>`
                ).join('')}
              </div>`;
            }

            const timeStr = createdAt
              ? createdAt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
              : 'Sending...';

            msgDiv.innerHTML = `
              <div class="msg-group">
                <div class="message-bubble"
                     data-id="${doc.id}"
                     data-mine="${isMine ? '1' : '0'}">
                  ${contentHtml}
                </div>
                ${reactionsHtml}
                <div class="msg-meta">
                  ${msg.edited ? '<span class="edited-tag">edited</span>' : ''}
                  <span class="msg-time">${timeStr}</span>
                </div>
              </div>`;

            messagesEl.appendChild(msgDiv);
          }

          // Re-attach call link handlers
          messagesEl.querySelectorAll('.call-link-bubble').forEach(el => {
            el.onclick = async () => {
              const roomId = el.getAttribute('data-room');
              const callType = el.getAttribute('data-type') || 'video';
              joinCallRoom(roomId, false, callType);
            };
          });

          if (wasAtBottom || snapshot.docChanges().some(c => c.type === 'added' && c.doc.data().senderId === userUID)) {
            scrollToBottom(false);
          }
        }, err => {
          messagesEl.innerHTML = `
            <div class="state-center">
              <div class="state-icon">⚠️</div>
              <div class="state-title">Error loading messages</div>
              <div class="state-sub">${err.message}</div>
            </div>`;
        });
    }

    // ===== SEND MESSAGE =====
    sendBtn.onclick = async function() {
      let text = inputEl.value.replace(/\s*\n\s*/g, ' ').trim();
      if (!text || !chatKey) return;
      this.disabled = true;
      try {
        const encryptedText = await encrypt(text, chatKey);
        await db.collection('chats').doc(chatId).collection('messages').add({
          senderId: userUID,
          text: encryptedText,
          encrypted: true,
          mediaUrl: null,
          mediaType: null,
          videoRoomId: null,
          expiresAt: null,
          reactions: {},
          edited: false,
          updatedAt: null,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await db.collection('chats').doc(chatId).set({
          lastMessageText: text,
          lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
          lastSenderId: userUID
        }, { merge: true });

        inputEl.value = '';
        inputEl.style.height = 'auto';
        scrollToBottom();
      } catch (e) {
        console.error('Send error:', e);
      } finally {
        this.disabled = false;
      }
    };

    inputEl.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });

    // ===== MEDIA UPLOAD =====
    attachBtn.onclick = () => { if (chatId) mediaInput.click(); };

    mediaInput.onchange = async e => {
      const file = e.target.files[0];
      if (!file || !chatId) return;
      if (file.size > 20 * 1024 * 1024) {
        alert('File too large (max 20MB)');
        mediaInput.value = '';
        return;
      }

      uploadToast.classList.add('show');
      try {
        const fileName = Date.now() + '_' + file.name;
        const ref = storage.ref().child(`chatMedia/${chatId}/${fileName}`);
        const snap = await ref.put(file);
        const url = await snap.ref.getDownloadURL();

        const isImage = file.type.startsWith('image/');
        const isVideo = file.type.startsWith('video/');

        await db.collection('chats').doc(chatId).collection('messages').add({
          senderId: userUID,
          text: '',
          encrypted: false,
          mediaUrl: url,
          mediaType: isImage ? 'image' : (isVideo ? 'video' : 'file'),
          videoRoomId: null,
          expiresAt: null,
          reactions: {},
          edited: false,
          updatedAt: null,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        await db.collection('chats').doc(chatId).set({
          lastMessageText: isImage ? '[Photo]' : (isVideo ? '[Video]' : '[File]'),
          lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),

        }, { merge: true });

        mediaInput.value = '';

      } finally {

      }
    };

    // ===== IMAGE VIEWER =====

      if (e.target === this) this.classList.remove('open');
    });

    // ===== CONTEXT MENU =====
    const ctxMenu = document.getElementById('msgContextMenu');
    const emojiPicker = document.getElementById('emojiPicker');
    let ctxMsgId = null, ctxIsMine = false;
    let longPressTimer = null;

    function hideCtx() {
      ctxMenu.style.display = 'none';
      emojiPicker.style.display = 'none';
    }

    function showCtx(x, y, msgId, isMine) {
      ctxMsgId = msgId;
      ctxIsMine = isMine;

      ctxMenu.querySelectorAll('.ctx-item').forEach(item => {
        const action = item.getAttribute('data-action');
        if (!isMine && (action === 'edit' || action === 'delete')) {
          item.style.display = 'none';
        } else {
          item.style.display = 'flex';
        }
      });

      ctxMenu.style.display = 'block';
      const rect = ctxMenu.getBoundingClientRect();
      const left = Math.min(x, window.innerWidth - 180);
      const top = Math.min(y, window.innerHeight - 160);
      ctxMenu.style.left = left + 'px';
      ctxMenu.style.top = top + 'px';
    }

    messagesEl.addEventListener('contextmenu', e => {
      const bubble = e.target.closest('.message-bubble');
      if (!bubble) return;
      e.preventDefault();
      showCtx(e.clientX, e.clientY, bubble.dataset.id, bubble.dataset.mine === '1');
    });

    messagesEl.addEventListener('touchstart', e => {
      const bubble = e.target.closest('.message-bubble');
      if (!bubble) return;
      const touch = e.touches[0];
      longPressTimer = setTimeout(() => {
        showCtx(touch.clientX, touch.clientY, bubble.dataset.id, bubble.dataset.mine === '1');
      }, 500);
    }, { passive: true });

    ['touchend', 'touchmove', 'touchcancel'].forEach(ev =>
      messagesEl.addEventListener(ev, () => {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
      }, { passive: true })
    );

    document.addEventListener('click', e => {
      if (!ctxMenu.contains(e.target) && !emojiPicker.contains(e.target)) hideCtx();
    });

    ctxMenu.addEventListener('click', async e => {
      const item = e.target.closest('.ctx-item');
      if (!item || !ctxMsgId) return;
      const action = item.dataset.action;

      if (action === 'react') {
        const menuRect = ctxMenu.getBoundingClientRect();
        emojiPicker.style.display = 'block';
        emojiPicker.style.left = menuRect.left + 'px';
        emojiPicker.style.top = (menuRect.top - 70) + 'px';
        ctxMenu.style.display = 'none';
        return;
      }

      ctxMenu.style.display = 'none';

      if (action === 'edit' && ctxIsMine) {
        const newText = prompt('Edit message:');
        if (!newText?.trim()) return;
        const clean = newText.replace(/\s*\n\s*/g, ' ').trim();
        try {
          const enc = await encrypt(clean, chatKey);
          await db.collection('chats').doc(chatId).collection('messages').doc(ctxMsgId).update({
            text: enc, encrypted: true, edited: true,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        } catch (err) { alert('Edit failed'); }
      }

      if (action === 'delete' && ctxIsMine) {
        if (!confirm('Delete this message?')) return;
        try {
          await db.collection('chats').doc(chatId).collection('messages').doc(ctxMsgId).delete();
        } catch (err) { alert('Delete failed'); }
      }
    });

    emojiPicker.addEventListener('click', async e => {
      const opt = e.target.closest('.emoji-opt');
      if (!opt || !ctxMsgId) return;
      const emoji = opt.dataset.emoji;
      hideCtx();
      try {
        const msgRef = db.collection('chats').doc(chatId).collection('messages').doc(ctxMsgId);
        const snap = await msgRef.get();
        const reactions = snap.exists ? (snap.data().reactions || {}) : {};
        await msgRef.set({ reactions: { ...reactions, [userUID]: emoji } }, { merge: true });
      } catch (err) { console.error('Reaction error:', err); }
    });

    // ===== WEBRTC =====
    const callOverlay = document.getElementById('callOverlay');
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const toggleMicBtn = document.getElementById('toggleMicBtn');
    const toggleCamBtn = document.getElementById('toggleCamBtn');
    const hangupBtn = document.getElementById('hangupBtn');

    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    let pc = null, localStream = null, remoteStream = null;
    let roomRef = null, caller = false;
    let micEnabled = true, camEnabled = true;
    let unsubCandidates = null, unsubRoom = null;
    let currentCallType = 'video';

    async function startLocalMedia(callType) {
      const constraints = callType === 'audio' ? { audio: true, video: false } : { audio: true, video: true };
      localStream = await navigator.mediaDevices.getUserMedia(constraints);
      localVideo.srcObject = localStream;

      const isAudio = callType === 'audio';
      localVideo.style.display = isAudio ? 'none' : 'block';
      remoteVideo.style.display = isAudio ? 'none' : 'block';
      document.getElementById('callInfoCenter').style.display = isAudio ? 'block' : 'none';
      toggleCamBtn.style.opacity = isAudio ? '0.4' : '1';

      remoteStream = new MediaStream();
      remoteVideo.srcObject = remoteStream;
    }

    async function createPeerConnection() {
      pc = new RTCPeerConnection(rtcConfig);
      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      pc.ontrack = e => e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t));
      pc.onicecandidate = async e => {
        if (!e.candidate || !roomRef) return;
        await roomRef.collection(caller ? 'callerCandidates' : 'calleeCandidates').add(e.candidate.toJSON());
      };
    }

    async function createRoomAndSendLink(callType) {
      currentCallType = callType;
      const roomId = chatId + '_' + callType + '_' + Date.now();
      roomRef = db.collection('rooms').doc(roomId);
      await roomRef.set({
        chatId, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        createdBy: userUID, type: callType
      });

      const expiresAt = Date.now() + 10 * 60 * 1000;
      await db.collection('chats').doc(chatId).collection('messages').add({
        senderId: userUID, text: '', encrypted: false,
        mediaUrl: null, mediaType: null,
        videoRoomId: roomId, expiresAt,
        callType, reactions: {}, edited: false,
        updatedAt: null, createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      await db.collection('chats').doc(chatId).set({
        lastMessageText: callType === 'audio' ? '[Voice call]' : '[Video call]',
        lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
        lastSenderId: userUID
      }, { merge: true });

      await joinCallRoom(roomId, true, callType);
    }

    async function joinCallRoom(roomId, isCaller = false, callType = 'video') {
      try {
        currentCallType = callType;
        callOverlay.classList.add('active');

        const displayName = selectedFriend.name || selectedFriend.username || selectedFriend.phone || 'User';
        document.getElementById('callTopName').textContent = displayName;
        document.getElementById('callTopType').textContent = callType === 'audio' ? 'Voice Call' : 'Video Call';
        document.getElementById('callTopStatus').textContent = 'Connecting...';
        document.getElementById('callInfoName').textContent = displayName;
        document.getElementById('callInfoSub').textContent = callType === 'audio' ? 'Voice call...' : 'Video call...';

        const avatarEl = document.getElementById('callAvatarLg');
        avatarEl.textContent = displayName[0]?.toUpperCase() || 'U';

        await startLocalMedia(callType);
        await createPeerConnection();

        caller = isCaller;
        roomRef = db.collection('rooms').doc(roomId);

        const snap = await roomRef.get();
        if (!snap.exists && isCaller) {
          await roomRef.set({ chatId, type: callType, createdAt: firebase.firestore.FieldValue.serverTimestamp(), createdBy: userUID }, { merge: true });
        } else if (!snap.exists && !isCaller) {
          alert('Call not found.'); endCall(false); return;
        }

        if (isCaller) {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          await roomRef.set({ offer: { type: offer.type, sdp: offer.sdp }, type: callType }, { merge: true });

          unsubRoom = roomRef.onSnapshot(async s => {
            const d = s.data();
            if (!d) return;
            if (d.ended) { endCall(false); return; }
            if (!pc.currentRemoteDescription && d.answer) {
              await pc.setRemoteDescription(new RTCSessionDescription(d.answer));
              document.getElementById('callTopStatus').textContent = 'Connected';
            }
          });
        } else {
          const data = snap.data();
          if (!data.offer) { alert('Call not ready.'); endCall(false); return; }
          await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          await roomRef.set({ answer: { type: answer.type, sdp: answer.sdp } }, { merge: true });

          unsubRoom = roomRef.onSnapshot(s => {
            const d = s.data();
            if (!d) return;
            if (d.ended) { endCall(false); return; }
            document.getElementById('callTopStatus').textContent = 'Connected';
          });
        }

        unsubCandidates = roomRef.collection(isCaller ? 'calleeCandidates' : 'callerCandidates')
          .onSnapshot(s => {
            s.docChanges().forEach(ch => {
              if (ch.type === 'added' && pc) {
                pc.addIceCandidate(new RTCIceCandidate(ch.doc.data()));
              }
            });
          });

      } catch (e) {
        console.error('Call error:', e);
        alert('Unable to connect call: ' + e.message);
        endCall(true);
      }
    }

    async function endCall(sendEndSignal = true) {
      callOverlay.classList.remove('active');
      if (sendEndSignal && roomRef) {
        try { await roomRef.set({ ended: true }, { merge: true }); } catch {}
      }
      if (unsubRoom) { unsubRoom(); unsubRoom = null; }
      if (unsubCandidates) { unsubCandidates(); unsubCandidates = null; }
      if (pc) { pc.getSenders().forEach(s => s.track?.stop()); pc.close(); pc = null; }
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      if (remoteStream) { remoteStream.getTracks().forEach(t => t.stop()); remoteStream = null; }
      if (roomRef && caller) {
        try {
          const cc = await roomRef.collection('calleeCandidates').get();
          cc.forEach(d => d.ref.delete());
          const oc = await roomRef.collection('callerCandidates').get();
          oc.forEach(d => d.ref.delete());
          await roomRef.delete();
        } catch {}
      }
      roomRef = null; caller = false;
      micEnabled = true; camEnabled = true;
      toggleMicBtn.textContent = '🎙️';
      toggleCamBtn.textContent = '📷';
    }

    videoBtn.onclick = () => { if (chatId) createRoomAndSendLink('video'); };
    voiceBtn.onclick = () => { if (chatId) createRoomAndSendLink('audio'); };
    hangupBtn.onclick = () => endCall(true);

    toggleMicBtn.onclick = () => {
      if (!localStream) return;
      micEnabled = !micEnabled;
      localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
      toggleMicBtn.textContent = micEnabled ? '🎙️' : '🔇';
      toggleMicBtn.classList.toggle('muted', !micEnabled);
    };

    toggleCamBtn.onclick = () => {
      if (!localStream || currentCallType === 'audio') return;
      camEnabled = !camEnabled;
      localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
      toggleCamBtn.textContent = camEnabled ? '📷' : '🚫';
      toggleCamBtn.classList.toggle('muted', !camEnabled);
    };

    // ===== INIT =====
    async function initChat() {
      try {
        chatId = [userUID, selectedFriend.id].sort().join('_');
        chatKey = await getChatKey(userUID, selectedFriend.id);
        await ensureChatDoc();
        await updateLastSeen();

        inputEl.disabled = false;
        sendBtn.disabled = false;

        loadMessages();
      } catch (e) {
        console.error('Init error:', e);
        messagesEl.innerHTML = `
          <div class="state-center">
            <div class="state-icon">❌</div>
            <div class="state-title">Connection failed</div>
            <div class="state-sub">${e.message}</div>
          </div>`;
      }
    }

    async function handleBack() {
      await updateLastSeen();
      window.location.href = 'chats.html';
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        updateLastSeen();
        setUserPresence(false);
      } else {
        setUserPresence(true);
      }
    });

    window.addEventListener('beforeunload', () => {
      setUserPresence(false);
      if (presenceInterval) clearInterval(presenceInterval);
    });

    auth.onAuthStateChanged(user => {
      if (!user) { window.location.href = 'index.html'; return; }
      userUID = user.uid;

      setUserPresence(true);
      presenceInterval = setInterval(() => setUserPresence(true), 30000);

      const friendStr = localStorage.getItem('selectedFriend');
      if (!friendStr) { window.location.href = 'chats.html'; return; }

      selectedFriend = JSON.parse(friendStr);
      if (!selectedFriend.id) { window.location.href = 'chats.html'; return; }

      const displayName = selectedFriend.name || selectedFriend.username || selectedFriend.phone || 'Chat';
      document.getElementById('chatTitle').textContent = displayName;

      const avatarEl = document.getElementById('friendAvatar');
      if (selectedFriend.photo) {
        avatarEl.innerHTML = `<img src="${selectedFriend.photo}" alt=""><div class="status-dot" id="statusDot"></div>`;
      } else {
        avatarEl.innerHTML = `${displayName[0]?.toUpperCase() || 'U'}<div class="status-dot" id="statusDot"></div>`;
      }

      watchFriendPresence(selectedFriend.id);
      initChat();
    });
  </script>
</body>
</html>
