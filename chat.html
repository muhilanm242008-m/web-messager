<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Messenger - Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111b21;
      color: #e9edef;
      height: 100vh;
      overflow: hidden;
    }
    .top-nav {
      background: #202c33;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a3942;
    }
    .back-btn {
      background: none;
      color: #e9edef;
      border: none;
      font-size: 1.4em;
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-header {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .chat-title { font-size: 16px; font-weight: 500; }
    .e2ee-status { font-size: 11px; color: #00a884; }
    .main-chat {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 52px);
      background: #0b141a;
      max-width: 900px;
      margin: 0 auto;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px;
    }
    .message {
      margin-bottom: 16px;
      display: flex;
      max-width: 100%;
    }
    .message.me { justify-content: flex-end; }
    .message.friend { justify-content: flex-start; }
    .message-bubble {
      max-width: 70%;
      padding: 6px 10px;
      border-radius: 7.5px;
      word-wrap: break-word;
      box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
      font-size: 14px;
    }
    .message.me .message-bubble {
      background: #005c4b;
      color: white;
      border-bottom-right-radius: 0;
    }
    .message.friend .message-bubble {
      background: #202c33;
      color: #e9edef;
      border-bottom-left-radius: 0;
    }
    .message-time {
      font-size: 10px;
      color: #667781;
      margin-top: 2px;
    }
    .message.me .message-time { text-align: right; }
    .message.friend .message-time { text-align: left; }

    .input-area {
      padding: 8px 10px;
      background: #202c33;
      border-top: 1px solid #2a3942;
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .input {
      flex: 1;
      padding: 9px 12px;
      background: #2a3942;
      border: none;
      border-radius: 18px;
      color: white;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      min-height: 40px;
      line-height: 18px;
    }
    .input::placeholder { color: #8696a0; }
    .input:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(0,168,132,0.3);
    }
    .send-btn {
      width: 40px;
      height: 40px;
      background: #00a884;
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .send-btn:disabled {
      background: #404c55;
      cursor: not-allowed;
    }
    .no-chat {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #8696a0;
      font-size: 14px;
      text-align: center;
      gap: 6px;
    }
    .loading { color: #00a884; }
  </style>
</head>
<body>
  <div class="top-nav">
    <button class="back-btn" onclick="window.location.href='profile.html'">←</button>
    <div class="chat-header">
      <div class="chat-title" id="chatTitle">Loading chat...</div>
      <div class="e2ee-status">🔒 End-to-End Encrypted</div>
    </div>
    <div style="width:40px;"></div>
  </div>

  <div class="main-chat">
    <div class="messages" id="messages">
      <div class="no-chat">
        <div style="font-size: 36px;">💬</div>
        <div>Messages will appear here</div>
      </div>
    </div>
    <div class="input-area">
      <textarea id="messageInput" class="input" placeholder="Type a secure message" disabled></textarea>
      <button id="sendBtn" class="send-btn" disabled>➤</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAFKOgNZgaIZ9q09VvmKJrnEWys7ancSEE",
      authDomain: "web-messager-533ae.firebaseapp.com",
      projectId: "web-messager-533ae",
      storageBucket: "web-messager-533ae.firebasestorage.app",
      messagingSenderId: "466370688536",
      appId: "1:466370688536:web:90e63387db2e4b697ff56d",
      measurementId: "G-Q3136YFH7C"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let userUID = null;
    let selectedFriend = null;
    let chatKey = null;
    let chatId = null;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    async function getChatKey(uid1, uid2) {
      const combined = [uid1, uid2].sort().join(':');
      const encoder = new TextEncoder();
      const keyData = encoder.encode(combined);
      const hashBuffer = await window.crypto.subtle.digest('SHA-256', keyData);
      const key = await window.crypto.subtle.importKey(
        'raw', hashBuffer, {name: 'AES-GCM'}, false, ['encrypt', 'decrypt']
      );
      return key;
    }

    async function encrypt(text, key) {
      const encoder = new TextEncoder();
      const iv = window.crypto.getRandomValues(new Uint8Array(12));
      const data = encoder.encode(text);
      const encrypted = await window.crypto.subtle.encrypt(
        { name: 'AES-GCM', iv }, key, data
      );
      return JSON.stringify({
        iv: Array.from(iv),
        data: Array.from(new Uint8Array(encrypted))
      });
    }

    async function decrypt(encryptedStr, key) {
      try {
        const ciphertext = JSON.parse(encryptedStr);
        const decoder = new TextDecoder();
        const iv = new Uint8Array(ciphertext.iv);
        const encryptedData = new Uint8Array(ciphertext.data);
        const decrypted = await window.crypto.subtle.decrypt(
          { name: 'AES-GCM', iv }, key, encryptedData
        );
        return decoder.decode(decrypted);
      } catch {
        return '[🔒 Unable to decrypt]';
      }
    }

    async function ensureChatDoc() {
      const chatRef = db.collection('chats').doc(chatId);
      const doc = await chatRef.get();
      if (!doc.exists) {
        await chatRef.set({
          participants: [userUID, selectedFriend.id],
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      } else if (!doc.data().participants) {
        await chatRef.set({
          participants: [userUID, selectedFriend.id]
        }, { merge: true });
      }
    }

    function loadMessages() {
      db.collection('chats').doc(chatId).collection('messages')
        .orderBy('createdAt', 'asc')
        .onSnapshot(async (snapshot) => {
          messagesEl.innerHTML = '';
          if (snapshot.empty) {
            messagesEl.innerHTML = `
              <div class="no-chat">
                <div style="font-size:32px;">🔒</div>
                <div>Start the conversation!</div>
              </div>`;
            return;
          }
          for (let doc of snapshot.docs) {
            const msg = doc.data();
            let displayText = msg.text;
            if (msg.encrypted && chatKey) {
              displayText = await decrypt(msg.text, chatKey);
            }
            const isMe = msg.senderId === userUID;
            const timeStr = msg.createdAt
              ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})
              : 'Pending';
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (isMe ? 'me' : 'friend');
            msgDiv.innerHTML = `
              <div>
                <div class="message-bubble">${escapeHtml(displayText)}</div>
                <div class="message-time">${timeStr}</div>
              </div>
            `;
            messagesEl.appendChild(msgDiv);
          }
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }, (error) => {
          console.error('Messages error:', error);
          messagesEl.innerHTML = '<div class="no-chat">❌ Error loading messages</div>';
        });
    }

    async function initChat() {
      try {
        messagesEl.innerHTML = '<div class="no-chat loading">Connecting to secure chat...</div>';
        chatId = [userUID, selectedFriend.id].sort().join('_');
        chatKey = await getChatKey(userUID, selectedFriend.id);
        await ensureChatDoc();

        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();

        inputEl.addEventListener('input', function() {
          this.style.height = 'auto';
          this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        loadMessages();
      } catch (e) {
        console.error('Chat init error:', e);
        messagesEl.innerHTML = '<div class="no-chat">❌ Chat connection failed</div>';
      }
    }

    sendBtn.onclick = async function() {
      const text = inputEl.value.trim();
      if (!text || !chatKey) return;
      this.disabled = true;
      try {
        const encryptedText = await encrypt(text, chatKey);
        await db.collection('chats').doc(chatId).collection('messages').add({
          senderId: userUID,
          text: encryptedText,
          encrypted: true,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        inputEl.value = '';
        inputEl.style.height = '40px';
      } catch (e) {
        console.error('Send error:', e);
        alert('Failed to send message');
      } finally {
        this.disabled = false;
      }
    };

    inputEl.onkeypress = function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    };

    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      userUID = user.uid;
      const friendStr = localStorage.getItem('selectedFriend');
      if (!friendStr) {
        window.location.href = 'profile.html';
        return;
      }
      selectedFriend = JSON.parse(friendStr);
      const title = selectedFriend.name || selectedFriend.username || selectedFriend.phone || 'Chat';
      document.getElementById('chatTitle').textContent = title;
      initChat();
    });
  </script>
</body>
</html>
